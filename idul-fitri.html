<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Idul Fitri 1446 H</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9933A;
    --gold-light: #F0C060;
    --gold-pale: #FFF0C0;
    --emerald: #1A4A3A;
    --emerald-mid: #2A6A50;
    --emerald-light: #3A8A60;
    --cream: #FAF5E4;
    --dark: #0E1E18;
  }

  html, body {
    width: 100%; min-height: 100%;
    overflow-y: auto;
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    cursor: default;
  }

  /* ===== LANTERN SCENE ===== */
  #scene {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, #1A3A2A 0%, #0A1810 60%, #050C08 100%);
    z-index: 0;
    overflow: hidden;
  }

  /* Stars */
  .stars {
    position: absolute; inset: 0; overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--o1); transform: scale(1); }
    to   { opacity: var(--o2); transform: scale(1.4); }
  }

  /* Moon */
  .moon-wrap {
    position: absolute;
    top: 7%; right: 12%;
    animation: moonFloat 6s ease-in-out infinite alternate;
  }
  @keyframes moonFloat {
    from { transform: translateY(0px); }
    to   { transform: translateY(-12px); }
  }
  .moon {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFF4C0, #E8C060 60%, #B89030);
    box-shadow:
      0 0 40px 10px rgba(232,192,96,0.4),
      0 0 80px 20px rgba(232,192,96,0.15);
    position: relative;
    overflow: hidden;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 10px; right: 15px;
    width: 65px; height: 65px;
    border-radius: 50%;
    background: radial-gradient(circle, #1A3A2A 60%, transparent 100%);
    opacity: 0.18;
  }

  /* Lanterns */
  .lantern-container {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .lantern {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    animation: sway var(--sw) ease-in-out infinite alternate;
    transform-origin: top center;
  }
  @keyframes sway {
    from { transform: rotate(calc(var(--sr) * -1deg)); }
    to   { transform: rotate(calc(var(--sr) * 1deg)); }
  }
  .lantern-string {
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(180,140,60,0.5));
    height: var(--sh);
  }
  .lantern-body {
    width: var(--lw); height: var(--lh);
    border-radius: 30% 30% 40% 40%;
    background: var(--lc);
    position: relative;
    box-shadow:
      0 0 20px 6px var(--lg),
      0 0 50px 15px var(--lg2),
      inset 0 0 20px rgba(255,255,200,0.3);
    animation: glow var(--sw) ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 15px 4px var(--lg), 0 0 40px 10px var(--lg2), inset 0 0 15px rgba(255,255,200,0.25); }
    to   { box-shadow: 0 0 28px 10px var(--lg), 0 0 70px 25px var(--lg2), inset 0 0 25px rgba(255,255,200,0.4); }
  }
  .lantern-body::before {
    content: '';
    position: absolute; inset: 8px;
    border-radius: 25% 25% 35% 35%;
    background: rgba(255,255,200,0.15);
  }
  .lantern-cap {
    width: calc(var(--lw) + 8px); height: 10px;
    background: linear-gradient(to bottom, #B89030, #8A6820);
    border-radius: 3px;
    margin-bottom: -2px;
  }
  .lantern-bottom {
    width: calc(var(--lw) * 0.4); height: 12px;
    background: linear-gradient(to bottom, #B89030, #8A6820);
    border-radius: 0 0 4px 4px;
    margin-top: -2px;
  }
  .lantern-tassel {
    width: 2px; height: var(--tl, 18px);
    background: linear-gradient(to bottom, var(--tc, #C93A3A), transparent);
    border-radius: 1px;
    margin-top: 2px;
  }

  /* Mosque silhouette */
  .mosque {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 900px;
  }

  /* ===== MAIN CARD ===== */
  #page-wrap {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  #card {
    position: relative;
    width: min(560px, 96vw);
    background:
      linear-gradient(160deg, rgba(42,106,80,0.95) 0%, rgba(26,74,58,0.98) 50%, rgba(14,30,24,0.99) 100%);
    border: 1px solid rgba(201,147,58,0.35);
    border-radius: 4px;
    padding: clamp(28px, 6vw, 52px) clamp(20px, 6vw, 48px) clamp(24px, 5vw, 44px);
    text-align: center;
    backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 1px rgba(201,147,58,0.1),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(201,147,58,0.2);
    animation: cardReveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.3s;
    opacity: 0;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner ornaments */
  .card-corner {
    position: absolute;
    width: 44px; height: 44px;
    opacity: 0.6;
  }
  .card-corner svg { width: 100%; height: 100%; }
  .card-corner.tl { top: 10px; left: 10px; }
  .card-corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .card-corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .card-corner.br { bottom: 10px; right: 10px; transform: scale(-1); }

  /* Arabic text */
  .arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1.3;
    text-shadow: 0 0 30px rgba(201,147,58,0.5);
    animation: fadeUp 0.8s ease both; animation-delay: 0.8s; opacity: 0;
  }

  .divider {
    margin: 18px auto;
    width: 80px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    animation: fadeUp 0.8s ease both; animation-delay: 1s; opacity: 0;
  }

  .title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(0.85rem, 3vw, 1.6rem);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.4;
    text-shadow: 0 0 20px rgba(201,147,58,0.4);
    white-space: nowrap;
    animation: fadeUp 0.8s ease both; animation-delay: 1.1s; opacity: 0;
  }

  .year {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    color: rgba(201,147,58,0.7);
    letter-spacing: 0.15em;
    margin-top: 4px;
    animation: fadeUp 0.8s ease both; animation-delay: 1.2s; opacity: 0;
  }

  .divider2 {
    margin: 20px auto 18px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeUp 0.8s ease both; animation-delay: 1.3s; opacity: 0;
  }
  .divider2-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,147,58,0.4)); }
  .divider2-line.r { background: linear-gradient(to left, transparent, rgba(201,147,58,0.4)); }
  .divider2-icon { color: var(--gold); font-size: 1.1rem; }

  .message {
    font-size: clamp(0.82rem, 2.2vw, 0.95rem);
    color: rgba(250,245,228,0.8);
    line-height: 1.85;
    font-weight: 300;
    letter-spacing: 0.01em;
    animation: fadeUp 0.8s ease both; animation-delay: 1.4s; opacity: 0;
  }

  /* Button */
  .btn {
    margin-top: 28px;
    display: inline-block;
    padding: 13px 36px;
    border: 1px solid var(--gold);
    border-radius: 3px;
    background: transparent;
    color: var(--gold-light);
    font-family: 'Lato', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
    animation: fadeUp 0.8s ease both; animation-delay: 1.6s; opacity: 0;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }
  .btn:hover { color: var(--dark); }
  .btn:hover::before { transform: scaleX(1); }
  .btn:active { transform: scale(0.97); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== FIREWORKS ===== */
  #fireworks-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* ===== KETUPAT FLOATING ===== */
  .ketupat {
    position: fixed;
    font-size: var(--ks, 1.4rem);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    animation: ketupatFall var(--kd, 4s) ease-in var(--kdelay, 0s) both;
  }
  @keyframes ketupatFall {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(105vh) rotate(360deg); }
  }

  /* Particles burst */
  .particle {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 25;
  }
</style>
</head>
<body>

<!-- Scene -->
<div id="scene">
  <div class="stars" id="stars"></div>
  <div class="moon-wrap"><div class="moon"></div></div>
  <div class="lantern-container" id="lanterns"></div>

  <!-- Mosque SVG silhouette -->
  <svg class="mosque" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 220 L0 160 L60 160 L60 130 L80 130 L80 80 Q90 40 100 80 L100 130 L120 130 L120 160 L180 160 L180 220Z" fill="#0A1810"/>
    <path d="M720 220 L720 160 L780 160 L780 130 L800 130 L800 80 Q810 40 820 80 L820 130 L840 130 L840 160 L900 160 L900 220Z" fill="#0A1810"/>
    <path d="M200 220 L200 150 L240 150 L240 120 L260 120 Q270 60 280 120 L300 120 L300 150 L340 150 L340 220Z" fill="#0A1810"/>
    <path d="M560 220 L560 150 L600 150 L600 120 L620 120 Q630 60 640 120 L660 120 L660 150 L700 150 L700 220Z" fill="#0A1810"/>
    <!-- Main dome -->
    <path d="M320 220 L320 100 L360 100 L360 60 Q380 10 400 5 Q420 10 440 60 L440 100 L480 100 L480 220Z" fill="#0D1E18"/>
    <!-- Main minaret left -->
    <path d="M330 220 L330 50 Q335 30 340 20 Q345 30 350 50 L350 220Z" fill="#0A1810"/>
    <!-- Main minaret right -->
    <path d="M450 220 L450 50 Q455 30 460 20 Q465 30 470 50 L470 220Z" fill="#0A1810"/>
    <!-- Dome top crescent -->
    <path d="M392 12 Q400 4 408 12 Q404 22 400 20 Q396 22 392 12Z" fill="rgba(201,147,58,0.3)"/>
  </svg>
</div>

<!-- Fireworks canvas -->
<canvas id="fireworks-canvas"></canvas>

<!-- Main Card -->
<div id="page-wrap">
<div id="card">
  <div class="card-corner tl">
    <svg viewBox="0 0 44 44" fill="none">
      <path d="M4 40 L4 4 L40 4" stroke="#C9933A" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="4" cy="4" r="3" fill="#C9933A" opacity="0.7"/>
      <path d="M12 28 Q22 14 28 12" stroke="#C9933A" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>
  <div class="card-corner tr"><svg viewBox="0 0 44 44" fill="none"><path d="M4 40 L4 4 L40 4" stroke="#C9933A" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="3" fill="#C9933A" opacity="0.7"/><path d="M12 28 Q22 14 28 12" stroke="#C9933A" stroke-width="0.8" opacity="0.5"/></svg></div>
  <div class="card-corner bl"><svg viewBox="0 0 44 44" fill="none"><path d="M4 40 L4 4 L40 4" stroke="#C9933A" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="3" fill="#C9933A" opacity="0.7"/><path d="M12 28 Q22 14 28 12" stroke="#C9933A" stroke-width="0.8" opacity="0.5"/></svg></div>
  <div class="card-corner br"><svg viewBox="0 0 44 44" fill="none"><path d="M4 40 L4 4 L40 4" stroke="#C9933A" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="3" fill="#C9933A" opacity="0.7"/><path d="M12 28 Q22 14 28 12" stroke="#C9933A" stroke-width="0.8" opacity="0.5"/></svg></div>

  <div class="arabic">عِيْدٌ مُبَارَكٌ</div>
  <div class="divider"></div>
  <div class="title">Selamat Hari Raya Idul Fitri</div>
  <div class="year">1 Syawal 1447 H &nbsp;·&nbsp; 2026 M</div>

  <div class="divider2">
    <div class="divider2-line"></div>
    <span class="divider2-icon">✦</span>
    <div class="divider2-line r"></div>
  </div>

  <p class="message">
    Taqabbalallāhu minnā wa minkum.<br>
    Semoga Allah menerima amal ibadah kita,<br>
    dan di hari yang fitri ini kita kembali<br>
    <em>suci seperti bayi yang baru lahir.</em><br><br>
    Mohon maaf lahir dan batin. 🌙
  </p>

  <button class="btn" id="celebrateBtn">✨ Rayakan ✨</button>
</div><!-- end card -->
</div><!-- end page-wrap -->

<script>
// ===== STARS =====
(function createStars() {
  const cont = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*75}%;
      --o1:${Math.random()*0.3+0.05};
      --o2:${Math.random()*0.5+0.3};
      --d:${Math.random()*3+1.5}s;
      animation-delay:${Math.random()*4}s;
    `;
    cont.appendChild(s);
  }
})();

// ===== LANTERNS =====
(function createLanterns() {
  const cont = document.getElementById('lanterns');
  const configs = [
    { left:'4%', top:'0', lw:34, lh:52, sh:'60px', sw:3.5, sr:6, lc:'#8B1A1A', lg:'rgba(180,40,40,0.5)', lg2:'rgba(180,40,40,0.15)', tc:'#C93A3A', tl:20 },
    { left:'14%', top:'0', lw:28, lh:44, sh:'90px', sw:4.5, sr:8, lc:'#1A4A2A', lg:'rgba(40,160,80,0.5)', lg2:'rgba(40,160,80,0.12)', tc:'#2A8A40', tl:16 },
    { left:'24%', top:'0', lw:36, lh:58, sh:'40px', sw:3, sr:5, lc:'#6B3A1A', lg:'rgba(201,147,58,0.6)', lg2:'rgba(201,147,58,0.18)', tc:'#C9933A', tl:22 },
    { left:'78%', top:'0', lw:32, lh:50, sh:'55px', sw:4, sr:7, lc:'#4A1A6B', lg:'rgba(130,60,200,0.4)', lg2:'rgba(130,60,200,0.12)', tc:'#8A3AC9', tl:18 },
    { left:'88%', top:'0', lw:26, lh:42, sh:'80px', sw:5, sr:9, lc:'#8B1A1A', lg:'rgba(180,40,40,0.4)', lg2:'rgba(180,40,40,0.1)', tc:'#C93A3A', tl:14 },
    { left:'70%', top:'0', lw:30, lh:48, sh:'30px', sw:3.8, sr:6, lc:'#1A3A6B', lg:'rgba(58,120,201,0.5)', lg2:'rgba(58,120,201,0.15)', tc:'#3A78C9', tl:20 },
  ];
  configs.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'lantern';
    wrap.style.cssText = `left:${c.left};top:${c.top};--sw:${c.sw}s;--sr:${c.sr};--lw:${c.lw}px;--lh:${c.lh}px;--sh:${c.sh};--lg:${c.lg};--lg2:${c.lg2};--lc:${c.lc};--tc:${c.tc};--tl:${c.tl}px;`;
    wrap.innerHTML = `
      <div class="lantern-string" style="height:${c.sh}"></div>
      <div class="lantern-cap"></div>
      <div class="lantern-body"></div>
      <div class="lantern-bottom"></div>
      <div class="lantern-tassel"></div>
    `;
    cont.appendChild(wrap);
  });
})();

// ===== FIREWORKS =====
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], animId = null, celebrating = false;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Firework {
  constructor(x, y) {
    this.x = x || Math.random() * W;
    this.y = y || H * (Math.random() * 0.5 + 0.05);
    this.count = 80 + Math.floor(Math.random() * 50);
    this.hue = Math.random() * 360;
  }
  burst() {
    for (let i = 0; i < this.count; i++) {
      const angle = (Math.PI * 2 / this.count) * i + Math.random() * 0.3;
      const speed = Math.random() * 5 + 2;
      particles.push({
        x: this.x, y: this.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1, size: Math.random() * 3 + 1.5,
        color: `hsl(${this.hue + Math.random()*40 - 20}, 90%, 65%)`
      });
    }
  }
}

function renderParticles() {
  ctx.clearRect(0, 0, W, H);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08; p.vx *= 0.98;
    p.alpha -= 0.018;
    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  if (celebrating || particles.length > 0) animId = requestAnimationFrame(renderParticles);
  else animId = null;
}

function launchFirework() {
  const fw = new Firework();
  fw.burst();
}

function celebrate() {
  if (celebrating) return;
  celebrating = true;
  if (!animId) renderParticles();

  let count = 0;
  const interval = setInterval(() => {
    launchFirework();
    launchFirework();
    count++;
    if (count >= 12) {
      clearInterval(interval);
      celebrating = false;
      // drop ketupat
      dropKetupat();
    }
  }, 300);
}

// ===== KETUPAT RAIN =====
const symbols = ['🌙','⭐','✨','🎊','🎉','💫','🌟'];

function dropKetupat() {
  for (let i = 0; i < 35; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'ketupat';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      const ks = (Math.random() * 1.2 + 0.8).toFixed(2);
      const kd = (Math.random() * 3 + 2.5).toFixed(1);
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:-30px;
        --ks:${ks}rem;
        --kd:${kd}s;
        --kdelay:0s;
        font-size:${ks}rem;
        animation: ketupatFall ${kd}s ease-in both;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), parseFloat(kd) * 1000 + 500);
    }, i * 120);
  }
}

// Button
document.getElementById('celebrateBtn').addEventListener('click', function() {
  celebrate();
  this.textContent = '🎆 Allahu Akbar! 🎆';  this.disabled = true;
  setTimeout(() => {
    this.textContent = '✨ Rayakan ✨';
    this.disabled = false;
  }, 5000);
});

// Click firework on scene
document.getElementById('scene').addEventListener('click', function(e) {
  const fw = new Firework(e.clientX, e.clientY);
  fw.burst();
  if (!animId) renderParticles();
});

// Auto first celebrate after load
setTimeout(celebrate, 2200);
</script>
</body>
</html>
