<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Danbooru Fetcher</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─── RESET & TOKENS ────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --lime:   #C9FF00;
  --lime2:  #b3e600;
  --ink:    #111111;
  --white:  #FFFFFF;
  --card-r: 16px;
  --border: 2.5px solid #111;
  --shadow: 5px 5px 0 #111;
  --shadow-sm: 3px 3px 0 #111;
  --font-h: 'Fredoka One', cursive;
  --font:   'Nunito', sans-serif;
  /* rating colors */
  --g: #4ade80; --s: #facc15; --e: #f87171; --q: #fb923c;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--lime);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.25) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(255,255,255,.15) 0%, transparent 35%);
  min-height: 100vh;
  color: var(--ink);
  overflow-x: hidden;
}

/* ─── DOODLE DECORATIONS ────────────────────────────── */
.doodle { position: fixed; pointer-events: none; z-index: 0; opacity: .55; }
.doodle-tl { top: 20px; left: 18px; }
.doodle-tr { top: 12px; right: 24px; }
.doodle-bl { bottom: 60px; left: 30px; }
.doodle-br { bottom: 40px; right: 20px; }

/* ─── LAYOUT SHELL ──────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ─── HEADER ────────────────────────────────────────── */
.header {
  text-align: center;
  padding: 36px 16px 20px;
}
.header h1 {
  font-family: var(--font-h);
  font-size: clamp(2rem, 6vw, 3.6rem);
  letter-spacing: 1px;
  line-height: 1;
}
.header h1 span { color: var(--white); text-shadow: 3px 3px 0 var(--ink); }
.header p {
  font-weight: 700;
  margin-top: 6px;
  font-size: .95rem;
  opacity: .75;
}

/* ─── SEARCH BOX ────────────────────────────────────── */
.search-wrap {
  background: var(--white);
  border: var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px 22px;
  margin-bottom: 18px;
}
.search-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.tag-wrap {
  position: relative;
  flex: 1 1 260px;
}
.tag-wrap label, .ctrl-label {
  display: block;
  font-weight: 800;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
  color: #555;
}
#tagInput {
  width: 100%;
  padding: 11px 14px;
  border: var(--border);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  background: #fafafa;
  outline: none;
  transition: box-shadow .15s;
}
#tagInput:focus { box-shadow: var(--shadow-sm); background: #fff; }

/* Autocomplete dropdown */
.autocomplete-box {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--white);
  border: var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  z-index: 999;
  overflow: hidden;
  display: none;
  max-height: 260px;
  overflow-y: auto;
}
.ac-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  gap: 8px;
  transition: background .1s;
}
.ac-item:hover, .ac-item.active { background: var(--lime); }
.ac-item .ac-name { flex: 1; }
.ac-item .ac-count {
  font-size: 11px;
  background: #f0f0f0;
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 800;
  white-space: nowrap;
}
.ac-cat { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-0 { background:#4ade80; } /* general */
.cat-1 { background:#f87171; } /* artist */
.cat-3 { background:#c084fc; } /* copyright */
.cat-4 { background:#60a5fa; } /* character */
.cat-5 { background:#94a3b8; } /* meta */

/* Controls row */
.ctrl-group { display: flex; flex-direction: column; }
select.ctrl {
  padding: 11px 12px;
  border: var(--border);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  background: #fafafa;
  cursor: pointer;
  min-width: 140px;
  outline: none;
}
select.ctrl:focus { box-shadow: var(--shadow-sm); }

.btn-search {
  align-self: flex-end;
  padding: 12px 28px;
  background: var(--ink);
  color: var(--lime);
  border: var(--border);
  border-radius: 10px;
  font-family: var(--font-h);
  font-size: 1rem;
  letter-spacing: .5px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform .1s, box-shadow .1s;
  white-space: nowrap;
}
.btn-search:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--lime2); }
.btn-search:active { transform: translate(2px,2px); box-shadow: none; }

/* ─── ADVANCED FILTER ───────────────────────────────── */
.adv-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  font-family: var(--font);
  font-weight: 800;
  font-size: .82rem;
  cursor: pointer;
  margin-top: 14px;
  color: #555;
  padding: 0;
}
.adv-toggle svg { transition: transform .2s; }
.adv-toggle.open svg { transform: rotate(180deg); }

.adv-panel {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 2px dashed #ddd;
}
.adv-panel.open { display: grid; }
.adv-field label {
  display: block;
  font-weight: 800;
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
  color: #555;
}
.adv-field input[type="text"],
.adv-field input[type="number"] {
  width: 100%;
  padding: 9px 12px;
  border: var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  background: #fafafa;
  outline: none;
}
.adv-field input:focus { box-shadow: var(--shadow-sm); }
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.toggle {
  position: relative;
  width: 40px; height: 22px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: #ddd;
  border: 2px solid #111;
  border-radius: 22px;
  cursor: pointer;
  transition: background .2s;
}
.toggle input:checked + .toggle-track { background: var(--lime); }
.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: #111;
  border-radius: 50%;
  transition: transform .2s;
  pointer-events: none;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }
.toggle-label { font-weight: 700; font-size: .82rem; }

/* ─── STATUS BAR ────────────────────────────────────── */
.status-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}
.status-info {
  font-weight: 800;
  font-size: .88rem;
  background: var(--white);
  border: var(--border);
  border-radius: 30px;
  padding: 6px 14px;
  box-shadow: var(--shadow-sm);
}
.status-info span { color: #888; font-weight: 600; }
.btn-sm {
  padding: 7px 14px;
  border: var(--border);
  border-radius: 30px;
  font-family: var(--font);
  font-weight: 800;
  font-size: .8rem;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform .1s, box-shadow .1s;
  white-space: nowrap;
}
.btn-sm:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #111; }
.btn-sm:active { transform: translate(1px,1px); box-shadow: none; }
.btn-lime { background: var(--lime); color: var(--ink); }
.btn-white { background: var(--white); color: var(--ink); }
.btn-ink { background: var(--ink); color: var(--lime); }
.btn-danger { background: #f87171; color: #fff; }

/* ─── GALLERY GRID ──────────────────────────────────── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}

/* ─── CARD ──────────────────────────────────────────── */
.card {
  background: var(--white);
  border: var(--border);
  border-radius: var(--card-r);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: transform .18s, box-shadow .18s;
  cursor: pointer;
}
.card:hover { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #111; }
.card.done { outline: 3px solid #4ade80; outline-offset: -1px; }

/* Card image area */
.card-thumb {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: #e8f5e9;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.card:hover .card-thumb img { transform: scale(1.04); }

/* Video indicator */
.card-thumb.is-video::after {
  content: '▶';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,.5);
  pointer-events: none;
}

/* Overlay shown on hover */
.card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0;
  transition: opacity .2s;
}
.card:hover .card-overlay { opacity: 1; }
.btn-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--white);
  border: 2px solid #111;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-icon:hover { background: var(--lime); transform: scale(1.1); }

/* Badges on image corners */
.badge {
  position: absolute;
  font-size: 11px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1.5px solid #111;
  z-index: 10;
  line-height: 1.4;
  pointer-events: none;
}
.badge-score  { top: 7px; left: 7px; background: #fff; }
.badge-fav    { top: 7px; right: 7px; background: #fce4ec; }
.badge-size   { bottom: 7px; right: 7px; }
.badge-done   { bottom: 7px; left: 7px; background: #4ade80; color: #fff; }
.badge-rating {
  position: absolute;
  top: 42px; left: 7px;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1.5px solid #111;
  z-index: 10;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.size-green { background: #4ade80; color: #fff; }
.size-yellow { background: #facc15; color: #111; }
.size-red { background: #f87171; color: #fff; }
.rating-g { background: #4ade80; color: #fff; }
.rating-s { background: #facc15; color: #111; }
.rating-e { background: #f87171; color: #fff; }
.rating-q { background: #fb923c; color: #fff; }

/* Checkbox */
.card-check {
  position: absolute;
  top: 7px; left: 7px;
  width: 18px; height: 18px;
  accent-color: var(--lime);
  cursor: pointer;
  z-index: 20;
  border: 2px solid #111;
  border-radius: 4px;
}

/* Card footer */
.card-info {
  padding: 10px 11px 11px;
  border-top: 2px solid #f0f0f0;
}
.card-id {
  font-size: 10px;
  font-weight: 800;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.card-ext {
  font-size: 12px;
  font-weight: 800;
  margin-top: 2px;
}
.card-res {
  font-size: 11px;
  color: #777;
  font-weight: 600;
}

/* ─── LOADING / EMPTY ────────────────────────────────── */
.placeholder {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}
.placeholder .ph-icon { font-size: 3rem; margin-bottom: 12px; }
.placeholder h3 { font-family: var(--font-h); font-size: 1.4rem; }
.placeholder p { color: #666; margin-top: 6px; font-size: .88rem; }

/* Skeleton cards */
.skeleton { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
.sk-thumb { background: #d4f56e; aspect-ratio: 1/1; }
.sk-line { background: #d4f56e; border-radius: 4px; height: 10px; margin: 8px 10px; }
.sk-line.w70 { width: 70%; }

/* ─── PAGINATION ─────────────────────────────────────── */
.page-wrap {
  text-align: center;
  margin-top: 30px;
}
.btn-more {
  padding: 14px 40px;
  background: var(--white);
  border: var(--border);
  border-radius: 50px;
  font-family: var(--font-h);
  font-size: 1.05rem;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .1s, box-shadow .1s;
}
.btn-more:hover { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #111; background: var(--lime); }
.btn-more:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

/* ─── LIGHTBOX ───────────────────────────────────────── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 9000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.lightbox.open { display: flex; }
.lb-close {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 2rem;
  color: #fff;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
  font-family: var(--font-h);
}
.lb-img-wrap {
  max-width: 90vw;
  max-height: 75vh;
  position: relative;
}
.lb-img-wrap img {
  max-width: 90vw;
  max-height: 75vh;
  object-fit: contain;
  border: 3px solid #fff;
  border-radius: 12px;
}
.lb-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  color: #fff;
  cursor: pointer;
  background: rgba(0,0,0,.5);
  border: none;
  border-radius: 50%;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.lb-nav.prev { left: -56px; }
.lb-nav.next { right: -56px; }
.lb-info {
  margin-top: 16px;
  text-align: center;
  color: #fff;
}
.lb-info h3 { font-family: var(--font-h); font-size: 1.1rem; }
.lb-info p { font-size: .8rem; color: #ccc; margin-top: 4px; max-width: 600px; line-height: 1.5; word-break: break-word; }
.lb-actions { display: flex; gap: 10px; margin-top: 12px; }
.lb-tag-chips {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-top: 8px; max-width: 680px; justify-content: center;
  max-height: 80px; overflow-y: auto;
}
.lb-tag {
  background: rgba(255,255,255,.15);
  color: #fff;
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  cursor: pointer;
  transition: background .15s;
}
.lb-tag:hover { background: var(--lime); color: #111; }

/* ─── TOAST ──────────────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: var(--lime);
  padding: 10px 22px;
  border-radius: 30px;
  font-family: var(--font);
  font-weight: 800;
  font-size: .88rem;
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
  animation: toastIn .3s ease, toastOut .3s ease 2.2s forwards;
  pointer-events: none;
}
@keyframes toastIn  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }

/* ─── FLOATING PANEL BUTTON ──────────────────────────── */
.fab {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 52px; height: 52px;
  background: var(--ink);
  color: var(--lime);
  border: var(--border);
  border-radius: 50%;
  font-size: 1.4rem;
  cursor: pointer;
  box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  z-index: 800;
  transition: transform .15s, background .15s;
}
.fab:hover { transform: scale(1.08); background: #222; }

.settings-panel {
  position: fixed;
  bottom: 86px; right: 24px;
  width: 280px;
  background: var(--white);
  border: var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 18px;
  z-index: 800;
  display: none;
  flex-direction: column;
  gap: 10px;
}
.settings-panel.open { display: flex; }
.settings-title {
  font-family: var(--font-h);
  font-size: 1rem;
  border-bottom: 2px dashed #ddd;
  padding-bottom: 8px;
  margin-bottom: 2px;
}
.settings-stat {
  font-size: .8rem;
  color: #777;
  font-weight: 600;
  background: #f5f5f5;
  border-radius: 8px;
  padding: 8px 10px;
  line-height: 1.7;
}
.settings-stat b { color: #111; }

/* ─── SCROLLBAR ──────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #bbb; border-radius: 10px; }
</style>
</head>
<body>

<!-- Doodle decorations -->
<svg class="doodle doodle-tl" width="80" height="80" viewBox="0 0 80 80">
  <path d="M40 5 L43 35 L73 38 L43 41 L46 71 L40 43 L10 46 L38 43 L35 13 Z" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
</svg>
<svg class="doodle doodle-tr" width="90" height="90" viewBox="0 0 90 90">
  <path d="M45 10 C45 10 75 30 65 55 C55 80 20 75 15 50 C10 25 35 5 45 10Z" fill="none" stroke="#111" stroke-width="2.5"/>
  <path d="M35 40 C40 30 55 35 50 45 C45 55 30 50 35 40Z" fill="#111"/>
</svg>
<svg class="doodle doodle-bl" width="70" height="70" viewBox="0 0 70 70">
  <circle cx="35" cy="35" r="28" fill="none" stroke="#111" stroke-width="2.5"/>
  <circle cx="35" cy="35" r="12" fill="none" stroke="#111" stroke-width="2.5"/>
  <line x1="35" y1="7" x2="35" y2="63" stroke="#111" stroke-width="2"/>
  <line x1="7" y1="35" x2="63" y2="35" stroke="#111" stroke-width="2"/>
</svg>
<svg class="doodle doodle-br" width="65" height="65" viewBox="0 0 65 65">
  <path d="M32 5 L38 28 L62 32 L38 36 L42 60 L32 38 L8 42 L28 32 L22 8 Z" fill="#111"/>
</svg>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <h1>Danbooru <span>Fetcher</span></h1>
    <p>🌸 Browse · Download · Collect</p>
  </header>

  <!-- SEARCH BOX -->
  <div class="search-wrap">
    <div class="search-row">
      <!-- Tag input with autocomplete -->
      <div class="tag-wrap">
        <label for="tagInput">🏷️ Tags (spasi = AND, - = exclude)</label>
        <input type="text" id="tagInput" placeholder="wuthering_waves 1girl…" autocomplete="off" value="wuthering_waves">
        <div class="autocomplete-box" id="autocompleteBox"></div>
      </div>

      <!-- Order By -->
      <div class="ctrl-group">
        <label class="ctrl-label">📊 Order By</label>
        <select id="orderInput" class="ctrl">
          <option value="">Terbaru (ID)</option>
          <option value="order:score">⭐ Score</option>
          <option value="order:favcount">♡ Favorites</option>
          <option value="order:rank">🔥 Trending</option>
          <option value="order:views">👁 Views</option>
        </select>
      </div>

      <!-- Rating -->
      <div class="ctrl-group">
        <label class="ctrl-label">🔞 Rating</label>
        <select id="ratingInput" class="ctrl">
          <option value="rating:general">General ✅</option>
          <option value="rating:sensitive">Sensitive 🟡</option>
          <option value="rating:questionable">Questionable 🟠</option>
          <option value="rating:explicit">Explicit 🔴</option>
          <option value="">Semua</option>
        </select>
      </div>

      <!-- Limit -->
      <div class="ctrl-group">
        <label class="ctrl-label">📦 Jumlah</label>
        <select id="limitInput" class="ctrl">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>

      <button class="btn-search" onclick="startSearch()">🔍 Cari</button>
    </div>

    <!-- Advanced toggle -->
    <button class="adv-toggle" id="advToggle" onclick="toggleAdv()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      Filter Lanjutan
    </button>

    <div class="adv-panel" id="advPanel">
      <div class="adv-field">
        <label>🏷️ Tag Filter (must, -exclude, ~optional)</label>
        <input type="text" id="tagFilterInput" placeholder="-nsfw ~solo ~couple">
      </div>
      <div class="adv-field">
        <label>📏 Ukuran Min (MB)</label>
        <input type="number" id="sizeMinInput" value="0" min="0" step="0.1">
      </div>
      <div class="adv-field">
        <label>📏 Ukuran Maks (MB)</label>
        <input type="number" id="sizeMaxInput" value="9999" min="0" step="0.1">
      </div>
      <div class="adv-field">
        <label>⚙️ Opsi</label>
        <div class="toggle-row" style="margin-top:8px">
          <label class="toggle">
            <input type="checkbox" id="toggleSizeIndicator" checked onchange="savePref()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span class="toggle-label">Tampilkan ukuran file</span>
        </div>
        <div class="toggle-row" style="margin-top:8px">
          <label class="toggle">
            <input type="checkbox" id="toggleAutoApply" onchange="savePref()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span class="toggle-label">Auto-select berdasar filter</span>
        </div>
        <div class="toggle-row" style="margin-top:8px">
          <label class="toggle">
            <input type="checkbox" id="toggleHideDone" onchange="applyCardFilters()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span class="toggle-label">Sembunyikan yg sudah DL</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar" style="display:none">
    <div class="status-info" id="statusInfo">—</div>
    <button class="btn-sm btn-lime" onclick="selectAll()">☑ Pilih Semua</button>
    <button class="btn-sm btn-white" onclick="deselectAll()">☐ Batal Pilih</button>
    <button class="btn-sm btn-ink"  onclick="downloadSelected()">⬇️ Unduh Dipilih</button>
    <button class="btn-sm btn-white" id="applyFilterBtn" onclick="applyCardFilters()">🔽 Terapkan Filter</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery" id="gallery">
    <div class="placeholder">
      <div class="ph-icon">🌸</div>
      <h3>Siap mencari gambar!</h3>
      <p>Masukkan tag dan klik Cari untuk mulai.</p>
    </div>
  </div>

  <!-- PAGINATION -->
  <div class="page-wrap" id="pageWrap" style="display:none">
    <button class="btn-more" id="btnMore" onclick="loadMore()">Muat Lebih Banyak ↓</button>
  </div>

</div><!-- /shell -->

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="">
    <button class="lb-nav prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
    <button class="lb-nav next" onclick="lbNav(+1);event.stopPropagation()">›</button>
  </div>
  <div class="lb-info">
    <h3 id="lbTitle"></h3>
    <p id="lbMeta"></p>
    <div class="lb-tag-chips" id="lbTags"></div>
    <div class="lb-actions">
      <button class="btn-sm btn-lime" id="lbDl" onclick="lbDownload()">⬇️ Unduh</button>
      <button class="btn-sm btn-white" id="lbOpen" onclick="lbOpenFull()">🔗 Buka Full</button>
      <button class="btn-sm btn-white" onclick="closeLightbox()">✕ Tutup</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- FLOATING FAB -->
<button class="fab" id="fabBtn" onclick="toggleSettings()" title="Pengaturan & Riwayat">⚙️</button>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">⚙️ Pengaturan & Riwayat</div>
  <div class="settings-stat" id="settingsStat">—</div>
  <button class="btn-sm btn-lime"   onclick="exportHistory()" style="width:100%">📤 Export Riwayat</button>
  <button class="btn-sm btn-white"  onclick="importHistory()" style="width:100%">📥 Import Riwayat</button>
  <button class="btn-sm btn-danger" onclick="clearHistory()"  style="width:100%">🗑️ Hapus Semua Riwayat</button>
  <div style="font-size:.75rem;color:#999;font-weight:700;border-top:1px dashed #ddd;padding-top:8px;margin-top:2px">
    Awoobooru Fetcher v2.0 · Data disimpan di localStorage
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const DOWNLOADED_KEY = "danbooru_downloaded_v2";
const PREFS_KEY      = "danbooru_prefs_v2";

let downloadedSet = new Set(JSON.parse(localStorage.getItem(DOWNLOADED_KEY) || "[]"));
let prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{"showSize":true,"autoApply":false}');

let allPosts    = [];   // raw API data for current search
let allCards    = [];   // DOM elements
let currentPage = 1;
let currentTags = "";
let currentLimit = 20;
let lbIndex     = 0;
let acTimer     = null;
let acData      = [];
let acActive    = -1;
let settingsOpen = false;

/* ══════════════════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════════════════ */
function saveDownloaded() {
  localStorage.setItem(DOWNLOADED_KEY, JSON.stringify([...downloadedSet]));
}

function savePref() {
  prefs.showSize   = document.getElementById("toggleSizeIndicator").checked;
  prefs.autoApply  = document.getElementById("toggleAutoApply").checked;
  localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
}

function loadPrefs() {
  document.getElementById("toggleSizeIndicator").checked = !!prefs.showSize;
  document.getElementById("toggleAutoApply").checked     = !!prefs.autoApply;
}

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function formatBytes(bytes) {
  if (!bytes) return null;
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(2) + " MB";
  return (bytes/1024/1024/1024).toFixed(2) + " GB";
}
function bytesToMB(bytes) { return (bytes||0) / 1024 / 1024; }
function sizeClass(mb) {
  if (mb >= 5) return "size-red";
  if (mb >= 2) return "size-yellow";
  return "size-green";
}
function ratingClass(r) {
  return {g:"rating-g", s:"rating-s", e:"rating-e", q:"rating-q"}[r] || "rating-q";
}
function ratingLabel(r) {
  return {g:"G", s:"S", e:"E", q:"Q"}[r] || r.toUpperCase();
}
function normalizeUrl(url) {
  try { const u = new URL(url); u.search=""; u.hash=""; return u.href; } catch { return url; }
}
function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1)+"k";
  return String(n);
}
function showToast(msg, duration=2500) {
  const tc = document.getElementById("toast-container");
  const t  = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

/* ══════════════════════════════════════════════════════
   TAG AUTOCOMPLETE
══════════════════════════════════════════════════════ */
const tagInput = document.getElementById("tagInput");
const acBox    = document.getElementById("autocompleteBox");

tagInput.addEventListener("input", () => {
  clearTimeout(acTimer);
  const raw = tagInput.value;
  const words = raw.split(/\s+/);
  const last  = words[words.length - 1].replace(/^[-~]/, "");
  if (last.length < 1) { closeAc(); return; }
  acTimer = setTimeout(() => fetchAc(last), 220);
});

tagInput.addEventListener("keydown", e => {
  const items = acBox.querySelectorAll(".ac-item");
  if (e.key === "ArrowDown") { acActive = Math.min(acActive+1, items.length-1); highlightAc(items); e.preventDefault(); }
  else if (e.key === "ArrowUp") { acActive = Math.max(acActive-1, 0); highlightAc(items); e.preventDefault(); }
  else if (e.key === "Enter" && acActive >= 0 && items[acActive]) {
    applyAcItem(acData[acActive]); e.preventDefault();
  } else if (e.key === "Escape") { closeAc(); }
  else if (e.key === "Enter" && acActive < 0) { startSearch(); closeAc(); }
});

document.addEventListener("click", e => {
  if (!acBox.contains(e.target) && e.target !== tagInput) closeAc();
});

async function fetchAc(q) {
  try {
    const url = `https://danbooru.donmai.us/tags/autocomplete.json?search[name_matches]=${encodeURIComponent(q)}*&limit=8&only=name,post_count,category`;
    const res  = await fetch(url);
    if (!res.ok) return;
    acData = await res.json();
    renderAc(acData);
  } catch {}
}

function renderAc(data) {
  if (!data.length) { closeAc(); return; }
  acBox.innerHTML = "";
  acActive = -1;
  data.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "ac-item";
    el.innerHTML = `
      <div class="ac-cat cat-${t.category}"></div>
      <span class="ac-name">${t.name}</span>
      <span class="ac-count">${fmtNum(t.post_count || 0)}</span>
    `;
    el.onmouseenter = () => { acActive = i; highlightAc(acBox.querySelectorAll(".ac-item")); };
    el.onclick = () => applyAcItem(t);
    acBox.appendChild(el);
  });
  acBox.style.display = "block";
}

function highlightAc(items) {
  items.forEach((el, i) => el.classList.toggle("active", i === acActive));
}

function applyAcItem(t) {
  const raw   = tagInput.value;
  const words = raw.split(/\s+/);
  const lastRaw = words[words.length - 1];
  const prefix  = lastRaw.match(/^[-~]/)?.[0] || "";
  words[words.length - 1] = prefix + t.name;
  tagInput.value = words.join(" ") + " ";
  closeAc();
  tagInput.focus();
}

function closeAc() { acBox.style.display = "none"; acActive = -1; }

/* ══════════════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════════════ */
async function startSearch() {
  closeAc();
  allPosts  = [];
  allCards  = [];
  currentPage = 1;
  currentLimit = parseInt(document.getElementById("limitInput").value);

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  showSkeletons(gallery, 8);

  document.getElementById("statusBar").style.display = "none";
  document.getElementById("pageWrap").style.display  = "none";

  await fetchPage(1, true);
}

function buildTagString() {
  const tag   = tagInput.value.trim();
  const order = document.getElementById("orderInput").value;
  const rating= document.getElementById("ratingInput").value;
  let parts   = [];
  if (tag)    parts.push(tag);
  if (order)  parts.push(order);
  if (rating) parts.push(rating);
  return parts.join(" ");
}

async function fetchPage(page, fresh=false) {
  const tagStr = buildTagString();
  currentTags  = tagStr;
  const limit  = currentLimit;

  if (!fresh) {
    const gallery = document.getElementById("gallery");
    showSkeletons(gallery, 4, false);
  }

  try {
    const url = `https://danbooru.donmai.us/posts.json?tags=${encodeURIComponent(tagStr)}&limit=${limit}&page=${page}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data  = await res.json();

    const gallery = document.getElementById("gallery");
    // Remove skeletons
    gallery.querySelectorAll(".skeleton").forEach(s => s.remove());

    if (fresh && data.length === 0) {
      gallery.innerHTML = `<div class="placeholder"><div class="ph-icon">😕</div><h3>Tidak ada hasil</h3><p>Coba tag atau filter lain.</p></div>`;
      return;
    }

    allPosts.push(...data);

    data.forEach(post => {
      if (post.file_url || post.preview_file_url) {
        const card = createCard(post);
        gallery.appendChild(card);
        allCards.push(card);
      }
    });

    updateStatusBar();
    document.getElementById("statusBar").style.display = "flex";

    // Show/hide load more
    const pageWrap = document.getElementById("pageWrap");
    if (data.length >= limit) {
      pageWrap.style.display = "block";
      document.getElementById("btnMore").disabled = false;
    } else {
      pageWrap.style.display = "none";
    }

    // Auto-apply filter
    if (prefs.autoApply) applyCardFilters();
    applyHideDone();

  } catch(e) {
    document.getElementById("gallery").querySelectorAll(".skeleton").forEach(s=>s.remove());
    document.getElementById("gallery").innerHTML += `<div class="placeholder"><div class="ph-icon">⚠️</div><h3>Terjadi error</h3><p>${e.message}</p></div>`;
  }
}

async function loadMore() {
  const btn = document.getElementById("btnMore");
  btn.disabled = true;
  btn.textContent = "Memuat…";
  currentPage++;
  await fetchPage(currentPage);
  btn.disabled = false;
  btn.textContent = "Muat Lebih Banyak ↓";
}

function showSkeletons(gallery, count, clear=true) {
  if (clear) gallery.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const s = document.createElement("div");
    s.className = "card skeleton";
    s.innerHTML = `<div class="sk-thumb"></div><div class="sk-line w70"></div><div class="sk-line" style="width:50%"></div>`;
    gallery.appendChild(s);
  }
}

/* ══════════════════════════════════════════════════════
   CARD CREATION
══════════════════════════════════════════════════════ */
function createCard(post) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id     = post.id;
  card.dataset.tags   = post.tag_string || "";
  card.dataset.rating = post.rating || "q";
  card.dataset.score  = post.score || 0;
  card.dataset.fav    = post.fav_count || 0;
  card.dataset.sizeBytes = post.file_size || 0;
  card.dataset.fileUrl   = post.file_url || post.large_file_url || "";
  card.dataset.fileName  = `danbooru_${post.id}.${post.file_ext || "jpg"}`;
  card.dataset.ext    = (post.file_ext || "jpg").toUpperCase();
  card.dataset.width  = post.image_width || 0;
  card.dataset.height = post.image_height || 0;

  const isDone = downloadedSet.has(normalizeUrl(card.dataset.fileUrl));
  if (isDone) card.classList.add("done");

  const mb       = bytesToMB(post.file_size);
  const sizeStr  = formatBytes(post.file_size);
  const rating   = post.rating || "q";
  const thumbSrc = post.preview_file_url || post.large_file_url || post.file_url || "";
  const isVideo  = ["mp4","webm"].includes((post.file_ext||"").toLowerCase());

  card.innerHTML = `
    <div class="card-thumb${isVideo?' is-video':''}">
      <img src="${thumbSrc}" alt="post ${post.id}" loading="lazy">
      <span class="badge badge-score">⭐ ${fmtNum(post.score||0)}</span>
      <span class="badge badge-fav">♡ ${fmtNum(post.fav_count||0)}</span>
      ${sizeStr && prefs.showSize ? `<span class="badge badge-size ${sizeClass(mb)}">${sizeStr}</span>` : ""}
      ${isDone ? `<span class="badge badge-done">✓ DL</span>` : ""}
      <span class="badge-rating ${ratingClass(rating)}">${ratingLabel(rating)}</span>
      <div class="card-overlay">
        <div class="btn-icon" title="Preview" data-action="preview">🔍</div>
        <div class="btn-icon" title="Unduh" data-action="download">⬇️</div>
        <div class="btn-icon" title="Buka Danbooru" data-action="open">🔗</div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-id">#${post.id}</div>
      <div class="card-ext">${card.dataset.ext}</div>
      <div class="card-res">${post.image_width}×${post.image_height}</div>
    </div>
  `;

  // Checkbox
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.className = "card-check";
  cb.title = "Pilih untuk batch download";
  cb.onclick = e => e.stopPropagation();
  card.querySelector(".card-thumb").appendChild(cb);

  // Action buttons
  card.querySelector("[data-action='preview']").onclick = e => { e.stopPropagation(); openLightbox(card); };
  card.querySelector("[data-action='download']").onclick = e => { e.stopPropagation(); downloadCard(card); };
  card.querySelector("[data-action='open']").onclick = e => { e.stopPropagation(); window.open(`https://danbooru.donmai.us/posts/${post.id}`, "_blank"); };

  card.onclick = () => openLightbox(card);

  return card;
}

function updateStatusBar() {
  const info = document.getElementById("statusInfo");
  const order = document.getElementById("orderInput");
  const orderText = order.options[order.selectedIndex].text;
  info.innerHTML = `<b>${allPosts.length}</b> hasil <span>· Urut: ${orderText} · Hal. ${currentPage}</span>`;
}

/* ══════════════════════════════════════════════════════
   FILTER (IN-PAGE)
══════════════════════════════════════════════════════ */
function parseTagQuery(q) {
  const must=[], exclude=[], optional=[];
  q.split(/\s+/).forEach(t => {
    if (!t) return;
    if (t.startsWith("-")) exclude.push(t.slice(1).toLowerCase());
    else if (t.startsWith("~")) optional.push(t.slice(1).toLowerCase());
    else must.push(t.toLowerCase());
  });
  return {must, exclude, optional};
}

function cardMatchesTagFilter(card, query) {
  if (!query.trim()) return true;
  const tags = (card.dataset.tags || "").toLowerCase().split(" ");
  const q = parseTagQuery(query);
  if (!q.must.every(t => tags.includes(t))) return false;
  if (q.exclude.some(t => tags.includes(t))) return false;
  if (q.optional.length && !q.optional.some(t => tags.includes(t))) return false;
  return true;
}

function cardMatchesSizeFilter(card) {
  const minMB = parseFloat(document.getElementById("sizeMinInput").value) || 0;
  const maxMB = parseFloat(document.getElementById("sizeMaxInput").value) || 9999;
  const mb = bytesToMB(parseInt(card.dataset.sizeBytes || 0));
  if (mb === 0) return true; // unknown size → pass
  return mb >= minMB && mb <= maxMB;
}

function applyCardFilters() {
  const tagQ  = document.getElementById("tagFilterInput").value;
  const hideDone = document.getElementById("toggleHideDone").checked;
  const auto  = document.getElementById("toggleAutoApply").checked;
  let shown=0, hidden=0;

  allCards.forEach(card => {
    const tagOk  = cardMatchesTagFilter(card, tagQ);
    const sizeOk = cardMatchesSizeFilter(card);
    const isDone = card.classList.contains("done");
    const visible = tagOk && sizeOk && !(hideDone && isDone);

    card.style.display = visible ? "" : "none";

    if (visible) {
      shown++;
      if (auto && tagOk && sizeOk) {
        const cb = card.querySelector(".card-check");
        if (cb) cb.checked = true;
      }
    } else {
      hidden++;
      const cb = card.querySelector(".card-check");
      if (cb) cb.checked = false;
    }
  });

  showToast(`✅ Filter diterapkan: ${shown} tampil, ${hidden} disembunyikan`);
}

function applyHideDone() {
  if (document.getElementById("toggleHideDone").checked) applyCardFilters();
}

/* ══════════════════════════════════════════════════════
   SELECTION & BATCH DOWNLOAD
══════════════════════════════════════════════════════ */
function selectAll() {
  allCards.forEach(c => { if (c.style.display !== "none") { const cb = c.querySelector(".card-check"); if(cb) cb.checked=true; } });
  showToast("☑ Semua dipilih");
}
function deselectAll() {
  allCards.forEach(c => { const cb = c.querySelector(".card-check"); if(cb) cb.checked=false; });
  showToast("☐ Seleksi dibatalkan");
}

async function downloadSelected() {
  const selected = allCards.filter(c => { const cb = c.querySelector(".card-check"); return cb && cb.checked; });
  if (!selected.length) { showToast("⚠️ Pilih gambar dulu!"); return; }
  showToast(`⬇️ Mengunduh ${selected.length} gambar…`, 3000);
  let count = 0;
  for (const card of selected) {
    if (!card.dataset.fileUrl) continue;
    await delay(300 * count);
    triggerDownload(card.dataset.fileUrl, card.dataset.fileName);
    markDownloaded(card);
    count++;
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function triggerDownload(url, filename) {
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.target = "_blank";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function downloadCard(card) {
  if (!card.dataset.fileUrl) { showToast("⚠️ URL tidak tersedia"); return; }
  triggerDownload(card.dataset.fileUrl, card.dataset.fileName);
  markDownloaded(card);
  showToast(`✅ Mengunduh #${card.dataset.id}`);
}

function markDownloaded(card) {
  const url = normalizeUrl(card.dataset.fileUrl);
  if (!url) return;
  downloadedSet.add(url);
  saveDownloaded();
  card.classList.add("done");
  // Add done badge if not present
  const thumb = card.querySelector(".card-thumb");
  if (thumb && !thumb.querySelector(".badge-done")) {
    const b = document.createElement("span");
    b.className = "badge badge-done";
    b.textContent = "✓ DL";
    thumb.appendChild(b);
  }
  updateSettingsStat();
}

/* ══════════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════════ */
function openLightbox(card) {
  const idx = allCards.indexOf(card);
  if (idx < 0) return;
  lbIndex = idx;
  showLb(idx);
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}

function showLb(idx) {
  const card = allCards[idx];
  if (!card) return;
  lbIndex = idx;

  const post = allPosts.find(p => String(p.id) === card.dataset.id);

  document.getElementById("lbImg").src = card.dataset.fileUrl || card.querySelector("img")?.src || "";
  document.getElementById("lbTitle").textContent = `#${card.dataset.id} · ${card.dataset.ext} · ${card.dataset.width}×${card.dataset.height}`;

  const mb = bytesToMB(parseInt(card.dataset.sizeBytes||0));
  const sizeStr = formatBytes(parseInt(card.dataset.sizeBytes||0)) || "?";
  document.getElementById("lbMeta").textContent = `Score: ${card.dataset.score} · Fav: ${card.dataset.fav} · Ukuran: ${sizeStr} · Rating: ${ratingLabel(card.dataset.rating)}`;

  // Tag chips
  const tagChips = document.getElementById("lbTags");
  tagChips.innerHTML = "";
  const tags = (card.dataset.tags || "").split(" ").filter(Boolean).slice(0, 40);
  tags.forEach(t => {
    const chip = document.createElement("span");
    chip.className = "lb-tag";
    chip.textContent = t;
    chip.onclick = () => { tagInput.value = t + " "; closeLightbox(); startSearch(); };
    tagChips.appendChild(chip);
  });
}

function lbNav(dir) {
  const newIdx = lbIndex + dir;
  if (newIdx < 0 || newIdx >= allCards.length) return;
  showLb(newIdx);
}

function lbDownload() {
  const card = allCards[lbIndex];
  if (card) downloadCard(card);
}
function lbOpenFull() {
  const card = allCards[lbIndex];
  if (card) window.open(`https://danbooru.donmai.us/posts/${card.dataset.id}`, "_blank");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("lbImg").src = "";
}
function closeLb(e) {
  if (e.target === document.getElementById("lightbox")) closeLightbox();
}

document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("open")) return;
  if (e.key === "ArrowLeft")  lbNav(-1);
  if (e.key === "ArrowRight") lbNav(+1);
  if (e.key === "Escape")     closeLightbox();
});

/* ══════════════════════════════════════════════════════
   ADVANCED TOGGLE
══════════════════════════════════════════════════════ */
function toggleAdv() {
  const panel  = document.getElementById("advPanel");
  const toggle = document.getElementById("advToggle");
  const open   = panel.classList.toggle("open");
  toggle.classList.toggle("open", open);
}

/* ══════════════════════════════════════════════════════
   SETTINGS PANEL
══════════════════════════════════════════════════════ */
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById("settingsPanel").classList.toggle("open", settingsOpen);
  updateSettingsStat();
}
document.addEventListener("click", e => {
  if (settingsOpen && !document.getElementById("settingsPanel").contains(e.target) && e.target !== document.getElementById("fabBtn")) {
    settingsOpen = false;
    document.getElementById("settingsPanel").classList.remove("open");
  }
});
function updateSettingsStat() {
  document.getElementById("settingsStat").innerHTML =
    `Total DL tercatat: <b>${downloadedSet.size}</b> URL`;
}

/* ══════════════════════════════════════════════════════
   HISTORY EXPORT / IMPORT / CLEAR
══════════════════════════════════════════════════════ */
function exportHistory() {
  const data = { app:"Danbooru Fetcher v2", exported: new Date().toISOString(), count: downloadedSet.size, urls: [...downloadedSet] };
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:"application/json"}));
  a.download = `danbooru_history_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`📤 Export selesai! ${downloadedSet.size} URL`);
}

function importHistory() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json,application/json";
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const items  = Array.isArray(parsed) ? parsed : (parsed.urls || []);
        let added = 0;
        items.forEach(u => { if (!downloadedSet.has(u)) { downloadedSet.add(u); added++; } });
        saveDownloaded();
        // Refresh done marks
        allCards.forEach(card => {
          if (downloadedSet.has(normalizeUrl(card.dataset.fileUrl))) {
            markDownloaded(card);
          }
        });
        updateSettingsStat();
        showToast(`📥 Import selesai! +${added} URL baru`);
      } catch { showToast("⚠️ File tidak valid"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearHistory() {
  if (!confirm(`Hapus semua ${downloadedSet.size} riwayat download?`)) return;
  downloadedSet.clear();
  saveDownloaded();
  allCards.forEach(card => {
    card.classList.remove("done");
    card.querySelector(".badge-done")?.remove();
  });
  updateSettingsStat();
  showToast("🗑️ Riwayat dihapus");
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
loadPrefs();
updateSettingsStat();
// Auto search on load
startSearch();

// Enter key on tag input
tagInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && acActive < 0) { e.preventDefault(); startSearch(); closeAc(); }
});
</script>
