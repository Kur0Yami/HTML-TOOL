<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TokoMart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="manifest" href="#" id="manifestLink"/>
<meta name="theme-color" content="#1a1208"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TokoMart"/>
<script>
// ── PWA MANIFEST (inline) ──
(function(){
  const manifest = {
    name: "TokoMart",
    short_name: "TokoMart",
    description: "Daftar harga toko",
    start_url: "./",
    display: "standalone",
    background_color: "#fdf6ec",
    theme_color: "#1a1208",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1208'/%3E%3Ctext y='.9em' font-size='72' x='50%25' text-anchor='middle' dominant-baseline='auto'%3E🛒%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1208'/%3E%3Ctext y='.9em' font-size='72' x='50%25' text-anchor='middle' dominant-baseline='auto'%3E🛒%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('manifestLink').href = url;
})();

// ── SERVICE WORKER (inline via blob) ──
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'tokomart-v1';
const ASSETS = [self.location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  // Network first untuk API GitHub, cache first untuk lainnya
  if(e.request.url.includes('api.github.com') || e.request.url.includes('fonts.gstatic') || e.request.url.includes('fonts.googleapis')){
    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
  } else {
    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
  }
});`;
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW failed (normal untuk file://):', e.message));
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf6ec;--warm:#fffdf9;--ink:#1a1208;--brown:#6b3d14;
  --amber:#d4820a;--al:#fff3d6;--am:#f5c842;
  --green:#2e6b3e;--gl:#e8f5ec;--red:#c0392b;--rl:#fdecea;
  --border:#e8d9c0;--muted:#a09080;
  --sh:0 2px 12px rgba(107,61,20,.10);
  --shl:0 8px 32px rgba(107,61,20,.16);
  --radius-card:12px;
  --card-img-h:80px;
}
[data-theme="ocean"]{
  --cream:#f0f7ff;--warm:#f8fcff;--ink:#0a1628;--brown:#1a4a7a;
  --amber:#2563eb;--al:#dbeafe;--am:#93c5fd;
  --green:#059669;--gl:#d1fae5;--red:#dc2626;--rl:#fee2e2;
  --border:#bfdbfe;--muted:#64748b;
  --sh:0 2px 12px rgba(37,99,235,.10);--shl:0 8px 32px rgba(37,99,235,.16);
}
[data-theme="forest"]{
  --cream:#f0fdf4;--warm:#f7fef9;--ink:#052e16;--brown:#166534;
  --amber:#16a34a;--al:#dcfce7;--am:#86efac;
  --green:#15803d;--gl:#d1fae5;--red:#dc2626;--rl:#fee2e2;
  --border:#bbf7d0;--muted:#6b7280;
  --sh:0 2px 12px rgba(22,163,74,.10);--shl:0 8px 32px rgba(22,163,74,.16);
}
[data-theme="purple"]{
  --cream:#faf5ff;--warm:#fdf8ff;--ink:#1e0a3c;--brown:#6b21a8;
  --amber:#7c3aed;--al:#ede9fe;--am:#c4b5fd;
  --green:#059669;--gl:#d1fae5;--red:#dc2626;--rl:#fee2e2;
  --border:#ddd6fe;--muted:#7c6a9c;
  --sh:0 2px 12px rgba(124,58,237,.10);--shl:0 8px 32px rgba(124,58,237,.16);
}
[data-theme="dark"]{
  --cream:#111827;--warm:#1f2937;--ink:#f9fafb;--brown:#d1d5db;
  --amber:#f59e0b;--al:#292524;--am:#fcd34d;
  --green:#10b981;--gl:#064e3b;--red:#ef4444;--rl:#450a0a;
  --border:#374151;--muted:#6b7280;
  --sh:0 2px 12px rgba(0,0,0,.4);--shl:0 8px 32px rgba(0,0,0,.5);
}
[data-theme="rose"]{
  --cream:#fff1f2;--warm:#fff5f6;--ink:#1c0a0d;--brown:#9f1239;
  --amber:#e11d48;--al:#ffe4e6;--am:#fda4af;
  --green:#059669;--gl:#d1fae5;--red:#dc2626;--rl:#fee2e2;
  --border:#fecdd3;--muted:#9d6172;
  --sh:0 2px 12px rgba(225,29,72,.10);--shl:0 8px 32px rgba(225,29,72,.16);
}
[data-theme="slate"]{
  --cream:#f8fafc;--warm:#ffffff;--ink:#0f172a;--brown:#334155;
  --amber:#0f172a;--al:#f1f5f9;--am:#94a3b8;
  --green:#059669;--gl:#d1fae5;--red:#dc2626;--rl:#fee2e2;
  --border:#e2e8f0;--muted:#94a3b8;
  --sh:0 2px 12px rgba(15,23,42,.08);--shl:0 8px 32px rgba(15,23,42,.12);
}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ── NAVBAR ── */
.navbar{background:var(--warm);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 14px;height:54px;display:flex;align-items:center;gap:10px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--amber)}
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap input{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px 7px 34px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--amber)}
.search-wrap input::placeholder{color:#c0a880}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#c0a880;pointer-events:none}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.spin{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-pill{background:var(--al);color:var(--brown);border:1px solid rgba(212,130,10,.25);border-radius:20px;font-size:10px;font-weight:500;padding:4px 10px;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.btn-adm{background:var(--ink);color:var(--am);border:none;border-radius:8px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-adm:hover{background:var(--brown)}

/* ── CATEGORY BAR ── */
.cat-bar{background:var(--warm);border-bottom:1.5px solid var(--border);padding:0 14px;height:44px;display:flex;align-items:center;gap:8px}
.size-panel{display:flex;align-items:center;gap:2px;margin-left:auto;flex-shrink:0}
.sz-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;line-height:1.4}
.sz-btn.on{background:var(--al);border-color:var(--amber);color:var(--brown)}
.sz-btn:active{transform:scale(.92)}
.cat-active-chip{display:flex;align-items:center;gap:6px;background:var(--ink);color:var(--am);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;opacity:0.7;transition:opacity .15s}
.cat-active-chip:active{opacity:1}
.cat-active-chip .chip-ico{font-size:14px}
.cat-active-chip .chip-arr{font-size:10px;opacity:.7}
.cat-all-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.cat-all-btn.active{background:var(--al);border-color:var(--amber);color:var(--brown)}

/* ── CATEGORY MODAL ── */
.cat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.cat-overlay.open{display:flex}
.cat-modal{background:var(--warm);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:75vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -6px 40px rgba(0,0,0,.2)}
.cat-modal-hd{padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.cat-modal-hd h3{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;overflow-y:auto}
@media(min-width:400px){.cat-grid{grid-template-columns:repeat(4,1fr)}}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--cream);cursor:pointer;transition:all .15s;text-align:center}
.cat-item:active{border-color:var(--amber);background:var(--al)}
.cat-item.active{border-color:var(--amber);background:var(--al)}
.cat-item-ico{font-size:1.8rem;line-height:1}
.cat-item-name{font-size:9px;font-weight:600;color:var(--ink);line-height:1.3;word-break:break-word}
.cat-item-count{font-size:8px;color:var(--muted)}

/* ── MAIN ── */
.main{max-width:1280px;margin:0 auto;padding:16px 12px 100px}
.section{margin-bottom:28px;animation:fu .4s ease both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-title{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:5px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:var(--grid-cols,repeat(3,1fr));gap:var(--grid-gap,10px)}
@media(min-width:780px){.grid{grid-template-columns:repeat(5,1fr)}}

/* ── CARD ── */
.card{background:var(--warm);border:1.5px solid #f0e4d0;border-radius:12px;overflow:hidden;box-shadow:var(--sh);position:relative;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s}
.card:active{border-color:var(--amber)}
.card-badge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;z-index:2;line-height:1.4}
.card-edit-btn{position:absolute;top:6px;left:6px;background:rgba(255,255,255,.85);color:var(--brown);border:none;border-radius:6px;width:22px;height:22px;display:none;align-items:center;justify-content:center;font-size:11px;cursor:pointer;z-index:3;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:background .15s}
.card-edit-btn:active{background:var(--al)}
.card:hover .card-edit-btn,.card:focus-within .card-edit-btn{display:flex}
.admin-mode .card-edit-btn{display:flex}
/* long press highlight */
.admin-mode .card{cursor:pointer}
.card.lp-active{border-color:var(--amber)!important;box-shadow:0 0 0 3px rgba(212,130,10,.25)!important}
/* context menu */
.ctx-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:800;display:none;align-items:flex-end;justify-content:center}
.ctx-overlay.open{display:flex}
.ctx-sheet{background:var(--warm);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding-bottom:env(safe-area-inset-bottom,8px);box-shadow:0 -6px 40px rgba(0,0,0,.2)}
.ctx-hd{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ctx-ico{font-size:1.4rem}
.ctx-info{flex:1}
.ctx-name{font-size:13px;font-weight:700;color:var(--ink)}
.ctx-sub{font-size:10px;color:var(--muted)}
.ctx-items{padding:8px 0}
.ctx-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background .12s}
.ctx-item:active{background:var(--al)}
.ctx-item-ico{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
.ctx-item-lbl{font-size:13px;font-weight:500;color:var(--ink)}
.ctx-item.danger .ctx-item-lbl{color:var(--red)}
.ctx-item.danger .ctx-item-ico{color:var(--red)}
.ctx-cancel{margin:0 14px 10px;padding:12px;border-radius:12px;background:var(--cream);border:none;width:calc(100% - 28px);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.ctx-cat-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:var(--cream);border:1.5px solid var(--border);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.ctx-cat-opt:active{border-color:var(--amber);background:var(--al)}
.ctx-cat-opt.current{border-color:var(--border);opacity:.4;cursor:default}
.ctx-cat-opt-ico{font-size:1.1rem}
.ctx-cat-opt-name{font-size:12px;font-weight:600;color:var(--ink)}
.ctx-cat-opt-count{font-size:10px;color:var(--muted);margin-left:auto}
.sec-add-btn{background:var(--amber);color:var(--ink);border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap}
.sec-add-btn:active{background:var(--brown);color:#fff}
.admin-mode .sec-add-btn{display:flex}
.badge-up{background:var(--rl);color:var(--red)}
.badge-down{background:var(--gl);color:var(--green)}
.card-img{background:linear-gradient(150deg,var(--al),var(--warm));height:var(--card-img-h,80px);display:flex;align-items:center;justify-content:center;font-size:2.2rem;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden}
body,body *{transition:background-color .25s,border-color .25s,color .2s;}
body .card,.body .navbar,.cart-fab{transition:background-color .25s,border-color .25s,color .2s,box-shadow .25s;}
.card-img img{width:100%;height:100%;object-fit:cover}
/* upload foto btn */
.img-upload-wrap{position:relative;display:inline-block}
.img-preview{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);display:block}
.img-placeholder{width:64px;height:64px;border-radius:8px;border:1.5px dashed var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer}
.img-upload-btn{position:absolute;bottom:-4px;right:-4px;background:var(--amber);color:var(--ink);border:none;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.img-clear-btn{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.card-body{padding:8px 9px 10px;display:flex;flex-direction:column;flex:1}
.card-name{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--muted);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:14px}

/* variant */
.v-select{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:4px 7px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);outline:none;margin-bottom:7px;cursor:pointer}
.v-select:focus{border-color:var(--amber)}
.v-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.vpill-row{display:flex;align-items:center;background:var(--cream);border:1.5px solid var(--border);border-radius:6px;overflow:hidden;transition:all .15s;height:26px}
/* belum dibeli, pill pertama (is-sel) = highlight border saja */
.vpill-row.is-sel{border-color:var(--amber)}
/* sudah dibeli = background amber penuh */
.vpill-row.has-qty{border-color:var(--amber);background:var(--warm)}
.vpill-lbl{font-size:9px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);padding:0 6px;cursor:pointer;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;height:100%;display:flex;align-items:center}
.vpill-row.is-sel .vpill-lbl{color:var(--brown)}
.vpill-row.has-qty .vpill-lbl{color:var(--brown);font-weight:700}
/* tombol + untuk pill belum di-cart — warna abu/border */
.vpill-add-btn{background:var(--border);color:var(--brown);border:none;width:22px;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0}
.vpill-row.is-sel .vpill-add-btn{background:var(--amber);color:var(--ink)}
.vpill-row.has-qty .vpill-add-btn{display:none}
/* qty control untuk pill yang sudah di-cart */
.vpill-qty-ctrl{display:none;align-items:center;height:100%}
.vpill-row.has-qty .vpill-qty-ctrl{display:flex}
.vpill-qbtn{background:var(--amber);color:var(--ink);border:none;width:22px;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;line-height:1;flex-shrink:0}
.vpill-qbtn:active{background:var(--brown);color:#fff}
.vpill-qnum{font-size:9px;font-weight:800;min-width:18px;text-align:center;color:var(--brown);padding:0 2px}

/* footer */
.card-ft{display:flex;flex-direction:column;margin-top:auto;gap:5px}
.card-price{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--brown);line-height:1}
.card-unit{font-size:9px;color:var(--muted);margin-top:1px}
.card-ft-row{display:flex;align-items:center;justify-content:space-between;gap:4px}

/* qty control */
.qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.q-btn{background:var(--amber);color:var(--ink);border:none;border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;font-weight:700;line-height:1;transition:background .12s;flex-shrink:0}
.q-btn:active{background:var(--brown);color:#fff}
.q-btn.add-only{border-radius:7px;width:26px;height:26px;margin-left:auto}
.q-num{font-size:12px;font-weight:700;min-width:18px;text-align:center;color:var(--ink)}

/* ── LOADING / EMPTY ── */
.loading{text-align:center;padding:50px 20px;color:var(--muted)}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:2.8rem;margin-bottom:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--am);border-radius:20px;padding:9px 18px;font-size:12px;font-weight:600;box-shadow:var(--shl);z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:var(--green);color:#fff}
.toast.err{background:var(--red);color:#fff}

/* ── CART FAB ── */

</head><body>
<nav class="navbar"><div class="nav-inner">

<script>
const GIST_ID='e57385e0215002f779ad0976afc5ba43';
let DB={settings:{storeName:'TokoMart',location:'Harga Toko Saya',variantStyle:'A'},categories:[]};
let cart=[],selVar={},selPill={},activeCat='all';
async function boot(){
  const saved=localStorage.getItem('tm_db_c');
  if(saved){try{DB=JSON.parse(saved);applyUI();applyTheme();render();}catch(e){}}
  else{document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><p>Memuat data toko…</p></div>';}
  updateSyncDot('spin');
  try{
    const r=await fetch('https://api.github.com/gists/'+GIST_ID,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const f=Object.values(d.files).find(x=>x.filename.endsWith('.json'));
    if(!f)throw new Error('no json');
    const data=f.truncated?await(await fetch(f.raw_url)).json():JSON.parse(f.content);
    DB=data;localStorage.setItem('tm_db_c',JSON.stringify(DB));
    applyUI();applyTheme();render();updateSyncDot('ok');
  }catch(e){
    updateSyncDot('err');
    if(!DB.categories?.length)document.getElementById('mainContent').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><p>Gagal memuat data.<br/>Cek koneksi internet.</p></div>';
  }
  const initSz=getCardSize();
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.toggle('on',b.id==='sz-'+initSz));
}
function updateSyncDot(s){const d=document.getElementById('syncDot');d.className='sync-dot '+s;d.title={ok:'✓ Data terbaru',err:'⚠ Data lokal',spin:'Memuat…'}[s]||'';}
function applyUI(){const s=DB.settings||{};const name=s.storeName||'TokoMart';const parts=name.split(' ');const last=parts.pop()||'';document.getElementById('navLogo').innerHTML=(parts.join(' ')+(parts.length?' ':''))+'<span>'+last+'</span>';document.title=name;document.getElementById('navPill').textContent=s.location||'Harga Toko Saya';}
function fmt(n){return Number(n).toLocaleString('id-ID');}

const SIZE_CFG = {
  xs:  {cols:'repeat(4,1fr)', gap:'5px',  imgH:'48px'},
  s:   {cols:'repeat(3,1fr)', gap:'7px',  imgH:'60px'},
  m:   {cols:'repeat(2,1fr)', gap:'10px', imgH:'80px'},
  l:   {cols:'repeat(2,1fr)', gap:'12px', imgH:'110px'},
  xl:  {cols:'repeat(1,1fr)', gap:'14px', imgH:'140px'},
}

function getCardSize(){
  // Pelanggan punya setting sendiri di localStorage, tidak dari Gist
  return localStorage.getItem('tm_card_size') || DB.settings?.cardSize || 'm';
}

function applyTheme(){
  // Tema warna dari DB.settings (dari Gist)
  const t=DB.settings?.theme||'';
  document.documentElement.setAttribute('data-theme',t);
  // Ukuran kartu dari localStorage (lokal per user)
  applyCardSize(getCardSize());
}

function applyCardSize(sz){
  const cfg=SIZE_CFG[sz]||SIZE_CFG.m;
  document.documentElement.style.setProperty('--grid-cols',cfg.cols);
  document.documentElement.style.setProperty('--grid-gap',cfg.gap);
  document.documentElement.style.setProperty('--card-img-h',cfg.imgH);
  // sync tombol aktif di panel
  document.querySelectorAll('.sz-btn').forEach(b=>{
    b.classList.toggle('on', b.id==='sz-'+sz);
  });
}

function setCardSize(sz, el){
  localStorage.setItem('tm_card_size', sz);
  applyCardSize(sz);
  render(); // rerender supaya font size ikut
}

function render(q=''){
  renderTabs();
  renderMain(q);
}

function renderTabs(){
  // Update cat grid di modal
  renderCatGrid();
  // Update chip/all button sesuai activeCat
  updateCatBar();
}

function renderCatGrid(){
  const el=document.getElementById('catGrid');
  if(!el) return;
  el.innerHTML=DB.categories.map(c=>`
    <div class="cat-item${activeCat===c.id?' active':''}" onclick="filterCat('${c.id}',null);closeCatModal()">
      <div class="cat-item-ico">${c.icon}</div>
      <div class="cat-item-name">${c.name}</div>
      <div class="cat-item-count">${(c.products||[]).length} item</div>
    </div>`).join('');
}

function updateCatBar(){
  const allBtn=document.getElementById('catAllBtn');
  const chip=document.getElementById('catChip');
  if(activeCat==='all'){
    allBtn.classList.add('active');
    // Reset chip ke default
    document.getElementById('catChipIco').textContent='📦';
    document.getElementById('catChipName').textContent='Kategori';
    chip.style.background='';
    chip.style.opacity='0.7';
  } else {
    allBtn.classList.remove('active');
    const cat=DB.categories.find(c=>c.id===activeCat);
    if(cat){
      document.getElementById('catChipIco').textContent=cat.icon;
      document.getElementById('catChipName').textContent=cat.name;
    }
    chip.style.opacity='1';
  }
}

function openCatModal(){
  renderCatGrid();
  document.getElementById('catOverlay').classList.add('open');
}

function closeCatModal(){
  document.getElementById('catOverlay').classList.remove('open');
}

function filterCat(id,btn){
  activeCat=id;
  updateCatBar();
  renderMain();
  window.scrollTo({top:0,behavior:'smooth'});
}

function scrollSec(id,btn){ document.getElementById('sec-'+id)?.scrollIntoView({behavior:'smooth',block:'start'}); }

function handleSearch(q){ if(q) activeCat='all'; render(q); }

function renderMain(q=''){
  const el=document.getElementById('mainContent');
  const ql=q.toLowerCase().trim();
  let html='';
  // Filter kategori: tampilkan semua atau hanya yg aktif
  const cats = activeCat==='all' ? DB.categories : DB.categories.filter(c=>c.id===activeCat);
  cats.forEach((cat,ci)=>{
    const prods=(cat.products||[]).filter(p=>!ql||p.name.toLowerCase().includes(ql)||(p.sub||'').toLowerCase().includes(ql));
    if(ql&&!prods.length) return;
    html+=`<div class="section" id="sec-${cat.id}" style="animation-delay:${ci*.06}s">
      <div class="sec-hd">
        <div class="sec-title">${cat.icon} ${cat.name}</div>
        <div class="sec-line"></div>
        <button class="sec-add-btn" onclick="quickAddProd('${cat.id}')">+ Produk</button>
      </div>
      <div class="grid">${(ql?prods:cat.products||[]).map(p=>cardHTML(p,cat.id)).join('')}</div>
    </div>`;
  });
  if(!html&&!DB.categories.length) html=`<div class="empty"><div class="empty-ico">🛒</div><p>Belum ada produk.<br/>Buka <b>Admin → Kategori</b> untuk mulai.</p></div>`;
  else if(!html) html=`<div class="empty"><div class="empty-ico">🔍</div><p>Tidak ditemukan: <b>${q}</b></p></div>`;
  html+=`<div class="info-bar"><div class="ii">🌐</div><p>Data diperbarui dari <strong>GitHub Gist</strong> pemilik toko.</p></div>`;
  el.innerHTML=html;
}

function cardHTML(p, catId){
  const badge=p.badge?`<div class="card-badge ${p.badge==='up'?'badge-up':'badge-down'}">${p.badge==='up'?'↑ Naik':'↓ Turun'}</div>`:'';

  let middle='', priceBlock='';

  if(p.variants?.length){
    const sty=p.variantStyle||DB.settings.variantStyle||'A';

    if(sty==='A'){
      // Dropdown: satu item aktif, pakai selVar
      const sv=selVar[p.id];
      const activeIdx=sv?sv.idx:0;
      const activeV=p.variants[Math.min(activeIdx,p.variants.length-1)];
      const activeKey=p.id+'|'+activeV.label;
      const cartEntry=cart.find(i=>i.key===activeKey);
      const qty=cartEntry?cartEntry.qty:0;
      middle=`<select class="v-select" id="vs-${p.id}" data-pid="${p.id}" onchange="syncVPrice(this)">
        ${p.variants.map((v,i)=>`<option value="${i}" data-price="${v.price}"${i===activeIdx?' selected':''}>${v.label} — Rp ${fmt(v.price)}</option>`).join('')}
      </select>`;
      const ctrl = qty>0
        ? `<div class="qty-ctrl"><button class="q-btn" onclick="cartAdj('${p.id}','${catId}',-1)">−</button><span class="q-num">${qty}</span><button class="q-btn" onclick="cartAdj('${p.id}','${catId}',1)">+</button></div>`
        : `<button class="q-btn add-only" onclick="cartAdj('${p.id}','${catId}',1)">+</button>`;
      const totalQty=cart.filter(i=>i.pid===p.id).reduce((s,i)=>s+i.qty,0);
      const totalPrice=cart.filter(i=>i.pid===p.id).reduce((s,i)=>s+i.price*i.qty,0);
      return `<div class="card" id="card-${p.id}" data-pid="${p.id}" data-catid="${catId}" oncontextmenu="cardCtxMenu(event,this)" ontouchstart="cardTouchStart(event,this)" ontouchend="cardTouchEnd()" ontouchmove="cardTouchEnd()">
        <button class="card-edit-btn" onclick="openEdit('${catId}','${p.id}')">✏</button>
        ${badge}
        <div class="card-img">${p.img?('<img src="'+p.img+'" alt="'+p.name+'"/>'):(p.icon||'🛒')}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.sub||'&nbsp;'}</div>
          ${middle}
          <div class="card-ft">
            <div class="card-ft-row">
              <div>
                <div class="card-price">${totalPrice>0?'Rp '+fmt(totalPrice):'Rp '+fmt(activeV.price)}</div>
                <div class="card-unit">${totalQty>0?totalQty+' item':(p.variantUnit&&p.variantUnit!=='— tanpa satuan —')?'per '+p.variantUnit:''}</div>
              </div>
            </div>
            <div class="card-ft-row" style="justify-content:flex-end">${ctrl}</div>
          </div>
        </div>
      </div>`;
    } else {
      // Pills style B: tiap pill punya qty control sendiri → bisa multi-varian
      middle=`<div class="v-pills" id="vpl-${p.id}">
        ${p.variants.map((v,vi)=>{
          const key=p.id+'|'+v.label;
          const entry=cart.find(i=>i.key===key);
          const q=entry?entry.qty:0;
          // is-sel = pill yg terakhir di-tap, atau pill pertama kalau belum pernah di-tap
          const isSel=(selPill[p.id]!=null ? selPill[p.id]===v.label : vi===0);
          return `<div class="vpill-row${q>0?' has-qty':isSel?' is-sel':''}">
            <span class="vpill-lbl" onclick="selectPill('${p.id}','${catId}','${v.label}',${v.price})">${v.label}</span>
            <button class="vpill-add-btn" onclick="pillAdd('${p.id}','${catId}','${v.label}',${v.price})">+</button>
            <div class="vpill-qty-ctrl">
              <button class="vpill-qbtn" onclick="pillAdj('${p.id}','${catId}','${v.label}',${v.price},-1)">−</button>
              <span class="vpill-qnum">${q}</span>
              <button class="vpill-qbtn" onclick="pillAdj('${p.id}','${catId}','${v.label}',${v.price},1)">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
      // Harga = total semua varian produk ini di cart
      const totalPrice=cart.filter(i=>i.pid===p.id).reduce((s,i)=>s+i.price*i.qty,0);
      const totalQty=cart.filter(i=>i.pid===p.id).reduce((s,i)=>s+i.qty,0);
      // harga tampil = pill yang is-sel saat ini
      const selLabel=selPill[p.id]||p.variants[0].label;
      const selV=p.variants.find(v=>v.label===selLabel)||p.variants[0];
      return `<div class="card" id="card-${p.id}" data-pid="${p.id}" data-catid="${catId}" oncontextmenu="cardCtxMenu(event,this)" ontouchstart="cardTouchStart(event,this)" ontouchend="cardTouchEnd()" ontouchmove="cardTouchEnd()">
        <button class="card-edit-btn" onclick="openEdit('${catId}','${p.id}')">✏</button>
        ${badge}
        <div class="card-img">${p.img?('<img src="'+p.img+'" alt="'+p.name+'"/>'):(p.icon||'🛒')}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.sub||'&nbsp;'}</div>
          ${middle}
          <div class="card-ft">
            <div class="card-ft-row">
              <div>
                <div class="card-price">${totalPrice>0?'Rp '+fmt(totalPrice):'Rp '+fmt(selV.price)}</div>
                <div class="card-unit">${totalQty>0?totalQty+' item':(p.variantUnit&&p.variantUnit!=='— tanpa satuan —')?'per '+p.variantUnit:''}</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
  }

  // Non-varian
  const qty=cart.find(i=>i.pid===p.id)?.qty||0;
  const ctrl2 = qty>0
    ? `<div class="qty-ctrl"><button class="q-btn" onclick="cartAdj('${p.id}','${catId}',-1)">−</button><span class="q-num">${qty}</span><button class="q-btn" onclick="cartAdj('${p.id}','${catId}',1)">+</button></div>`
    : `<button class="q-btn add-only" onclick="cartAdj('${p.id}','${catId}',1)">+</button>`;

  return `<div class="card" id="card-${p.id}" data-pid="${p.id}" data-catid="${catId}" oncontextmenu="cardCtxMenu(event,this)" ontouchstart="cardTouchStart(event,this)" ontouchend="cardTouchEnd()" ontouchmove="cardTouchEnd()">
    <button class="card-edit-btn" onclick="openEdit('${catId}','${p.id}')">✏</button>
    ${badge}
    <div class="card-img">${p.img?('<img src="'+p.img+'" alt="'+p.name+'"/>'):(p.icon||'🛒')}</div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-sub">${p.sub||'&nbsp;'}</div>
      <div class="card-ft">
        <div class="card-ft-row">
          <div>
            <div class="card-price">${qty>0?'Rp '+fmt((p.price||0)*qty):'Rp '+fmt(p.price||0)}</div>
            <div class="card-unit">${qty>0?(p.unit&&p.unit!=='— tanpa satuan —'?qty+' × Rp '+fmt(p.price||0)+' / '+p.unit:qty+' × Rp '+fmt(p.price||0)):(p.unit&&p.unit!=='— tanpa satuan —'?'per '+p.unit:'')}</div>
          </div>
        </div>
        <div class="card-ft-row" style="justify-content:flex-end">${ctrl2}</div>
      </div>
    </div>
  </div>`;
}

function syncVPrice(sel){
  const pid=sel.dataset.pid;
  const idx=sel.selectedIndex;
  const opt=sel.options[idx];
  const price=+opt.dataset.price;
  const label=opt.text.split(' — ')[0].trim();
  selVar[pid]={idx,label,price};
  const el=document.getElementById('cp-'+pid);
  if(el) el.textContent='Rp '+fmt(price);
  // update cart entry kalau ada
  const ci=cart.find(i=>i.pid===pid);
  if(ci){ ci.key=pid+'|'+label; ci.price=price; ci.variant=label; updateCartUI(); }
  // rerender untuk update tombol qty
  const cat=DB.categories.find(c=>c.products?.some(x=>x.id===pid));
  if(cat) rerenderCard(pid,cat.id);
}

  // Legacy fallback — tidak dipakai pills B lagi
}

function selectPill(pid,catId,label,price){
  // Tap label = highlight saja, tidak tambah cart
  selPill[pid]=label;
  rerenderCard(pid,catId);
}

function pillAdd(pid,catId,label,price){
  selPill[pid]=label; // update highlight
  const key=pid+'|'+label;
  const ex=cart.find(i=>i.key===key);
  if(ex){ ex.qty+=1; }
  else {
    const cat=DB.categories.find(c=>c.id===catId);
    const p=cat?.products?.find(x=>x.id===pid);
    cart.push({key,pid,catId,name:p.name,icon:p.icon||'🛒',price,variant:label,unit:p.variantUnit||p.unit||'',qty:1});
  }
  updateCartUI();
  rerenderCard(pid,catId);
}

function pillAdj(pid,catId,label,price,delta){
  selPill[pid]=label; // highlight pill yang aktif
  const key=pid+'|'+label;
  const ex=cart.find(i=>i.key===key);
  if(ex){
    ex.qty+=delta;
    if(ex.qty<=0) cart=cart.filter(i=>i.key!==key);
  } else if(delta>0){
    const cat=DB.categories.find(c=>c.id===catId);
    const p=cat?.products?.find(x=>x.id===pid);
    cart.push({key,pid,catId,name:p.name,icon:p.icon||'🛒',price,variant:label,unit:p.variantUnit||p.unit||'',qty:1});
  }
  updateCartUI();
  rerenderCard(pid,catId);
}

function getCardPrice(p){
  if(p.variants?.length){
    const sv=selVar[p.id];
    const idx=sv?sv.idx:0;
    const v=p.variants[Math.min(idx,p.variants.length-1)];
    return {price:v.price, variant:v.label};
  }
  return {price:p.price||0, variant:''};
}

function cartAdj(pid, catId, delta){
  const cat=DB.categories.find(c=>c.id===catId);
  const p=cat?.products?.find(x=>x.id===pid);
  if(!p) return;
  const {price, variant}=getCardPrice(p);
  const key=pid+'|'+variant;
  const ex=cart.find(i=>i.key===key);
  if(ex){
    ex.qty+=delta;
    if(ex.qty<=0) cart=cart.filter(i=>i.key!==key);
  } else if(delta>0){
    cart.push({key,pid,catId,name:p.name,icon:p.icon||'🛒',price,variant,unit:p.variantUnit||p.unit||'pcs',qty:1});
  }
  updateCartUI();
  rerenderCard(pid, catId);
}

function rerenderCard(pid, catId){
  const cat=DB.categories.find(c=>c.id===catId);
  const p=cat?.products?.find(x=>x.id===pid);
  if(!p) return;
  const el=document.getElementById('card-'+pid);
  if(!el) return;
  const newHTML=cardHTML(p,catId);
  const tmp=document.createElement('div'); tmp.innerHTML=newHTML;
  const newCard=tmp.firstElementChild;
  el.replaceWith(newCard);
}

function updateCartUI(){
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent=count;
  document.getElementById('cartTotal').textContent='Rp '+fmt(total);
  const fab=document.getElementById('cartFab');
  if(count>0) fab.classList.add('show'); else fab.classList.remove('show');
}

function renderCartBody(){
  const el=document.getElementById('cartBody');
  if(!cart.length){ el.innerHTML='<div class="cart-empty">🛒<br/>Keranjang kosong</div>'; return; }
  el.innerHTML=cart.map((item,i)=>`
    <div class="ci">
      <div class="ci-ico">${item.icon}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}${item.variant?' <span style="font-size:9px;color:var(--muted);font-weight:400">('+item.variant+')</span>':''}</div>
        <div class="ci-detail">Rp ${fmt(item.price)}${item.unit&&item.unit!=='— tanpa satuan —'?' / '+item.unit:''}</div>
      </div>
      <div class="ci-right">
        <div class="ci-price">Rp ${fmt(item.price*item.qty)}</div>
        <div class="ci-ctrl">
          <button class="ci-qbtn" onclick="cartDirectAdj(${i},-1)" style="font-size:15px">−</button>
          <span class="ci-qnum">${item.qty}</span>
          <button class="ci-qbtn" onclick="cartDirectAdj(${i},1)" style="font-size:15px">+</button>
          <button class="ci-qbtn" onclick="cartRemove(${i})" style="color:var(--red);border-color:var(--red);margin-left:2px;font-size:12px">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

function openCart(){ renderCartBody(); document.getElementById('cartOverlay').classList.add('open'); }

function closeCart(){ document.getElementById('cartOverlay').classList.remove('open'); }

function cartDirectAdj(idx,d){
  cart[idx].qty+=d;
  if(cart[idx].qty<=0){
    const {pid,catId}=cart[idx];
    cart.splice(idx,1);
    updateCartUI(); renderCartBody();
    if(pid) rerenderCard(pid,catId);
  } else { updateCartUI(); renderCartBody(); }
}

function cartRemove(idx){
  const {pid,catId}=cart[idx];
  cart.splice(idx,1);
  updateCartUI(); renderCartBody();
  if(pid) rerenderCard(pid,catId);
}

function clearCart(){
  const pids=[...new Set(cart.map(i=>({pid:i.pid,catId:i.catId})))];
  cart=[];
  updateCartUI(); renderCartBody();
  pids.forEach(({pid,catId})=>rerenderCard(pid,catId));
}

function addCustomItem(){
  const nameEl=document.getElementById('ciName');
  const qtyEl=document.getElementById('ciQty');
  const priceEl=document.getElementById('ciPrice');
  const name=nameEl.value.trim();
  const qty=+qtyEl.value||1;
  const price=+priceEl.value||0;
  if(!name) return toast('Nama barang wajib diisi!','err');
  if(!price) return toast('Harga wajib diisi!','err');
  const key='custom|'+Date.now();
  cart.push({key,pid:null,catId:null,name,icon:'✏️',price,variant:'',unit:'pcs',qty,custom:true});
  nameEl.value=''; qtyEl.value='1'; priceEl.value='';
  nameEl.focus();
  updateCartUI(); renderCartBody();
  toast(name+' ditambahkan ✓','ok');
}

function closeStruk(){ document.getElementById('strukOverlay').classList.remove('open'); }

function drawStruk(){
  const cv=document.getElementById('strukCanvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  if(!ctx) return;

  const debtorEl=document.getElementById('debtorName');
  const debtorName=debtorEl?debtorEl.value.trim():'';
  const s=DB.settings||{};
  const storeName=s.storeName||'TokoMart';
  const loc=s.location||'';
  const phone=s.phone||'';
  const addr=s.address||'';
  const strukTitle=s.strukTitle||'NOTA BELANJA';
  const strukFooter=s.strukFooter||'Terima kasih sudah belanja!';
  const now=new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count=cart.reduce((s,i)=>s+i.qty,0);

  // Hitung tinggi header dinamis (tambah baris kalau ada phone/addr)
  const extraLines=(phone?1:0)+(addr?1:0)+(debtorName?1:0);
  const W=360, PAD=22, IH=50, HDR=116+(extraLines*14), FTR=110;
  const H=HDR+(cart.length*IH)+FTR;
  cv.width=W*2; cv.height=H*2;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=ctx; c.scale(2,2);

  // bg putih
  c.fillStyle='#fffdf9'; c.fillRect(0,0,W,H);

  // header gelap — tinggi dinamis
  const hdrH=60+(extraLines*14);
  c.fillStyle='#1a1208'; c.fillRect(0,0,W,hdrH);

  // nama toko
  c.fillStyle='#f5c842';
  c.font='bold 17px Arial,sans-serif';
  c.textAlign='center';
  c.fillText(storeName,W/2,30);

  // tagline/lokasi
  let hy=46;
  if(loc){ c.fillStyle='#a09080'; c.font='10px Arial,sans-serif'; c.fillText(loc,W/2,hy); hy+=14; }
  if(phone){ c.fillStyle='#a09080'; c.font='10px Arial,sans-serif'; c.fillText('📞 '+phone,W/2,hy); hy+=14; }
  if(addr){ c.fillStyle='#a09080'; c.font='10px Arial,sans-serif'; c.fillText(addr,W/2,hy); }

  // judul struk + tanggal
  const dtY=hdrH+18;
  c.fillStyle='#6b3d14'; c.font='bold 10px Arial,sans-serif'; c.textAlign='center';
  c.fillText(strukTitle,W/2,dtY);
  if(debtorName){
    c.fillStyle='#1a1208'; c.font='bold 11px Arial,sans-serif';
    c.fillText('Pembeli: '+debtorName,W/2,dtY+14);
    c.fillStyle='#a09080'; c.font='9px Arial,sans-serif';
    c.fillText(now,W/2,dtY+27);
    dash(c,PAD,dtY+35,W-PAD,dtY+35);
  } else {
    c.fillStyle='#a09080'; c.font='9px Arial,sans-serif';
    c.fillText(now,W/2,dtY+14);
    dash(c,PAD,dtY+22,W-PAD,dtY+22);
  }

  // header kolom
  const chY=dtY+36;
  c.fillStyle='#a09080'; c.font='bold 9px Arial,sans-serif';
  c.textAlign='left'; c.fillText('ITEM',PAD,chY);
  c.textAlign='right'; c.fillText('QTY',W-90,chY);
  c.textAlign='right'; c.fillText('SUBTOTAL',W-PAD,chY);
  dash(c,PAD,chY+6,W-PAD,chY+6);

  // items
  let y=HDR;
  cart.forEach(item=>{
    const label=item.name+(item.variant?' ('+item.variant+')':'');
    c.fillStyle='#1a1208';
    c.font='bold 11px Arial,sans-serif';
    c.textAlign='left';
    c.fillText(clampText(c,label,W-120-PAD*2),PAD,y+15);
    c.fillStyle='#a09080';
    c.font='9px Arial,sans-serif';
    c.fillText('Rp '+fmt(item.price)+' / '+item.unit,PAD,y+28);
    c.fillStyle='#6b3d14';
    c.font='bold 11px Arial,sans-serif';
    c.textAlign='right';
    c.fillText('x'+item.qty,W-90,y+20);
    c.font='bold 12px Arial,sans-serif';
    c.fillText('Rp '+fmt(item.price*item.qty),W-PAD,y+20);
    dash(c,PAD,y+IH-4,W-PAD,y+IH-4,'#f0e4d0');
    y+=IH;
  });

  // total box
  const ty=y+10;
  c.fillStyle='#1a1208';
  rr(c,PAD,ty,W-PAD*2,48,10); c.fill();
  c.fillStyle='#a09080';
  c.font='10px Arial,sans-serif';
  c.textAlign='left';
  c.fillText('TOTAL  ('+count+' item)',PAD+14,ty+20);
  c.fillStyle='#f5c842';
  c.font='bold 17px Arial,sans-serif';
  c.textAlign='right';
  c.fillText('Rp '+fmt(total),W-PAD-14,ty+26);

  // footer
  c.fillStyle='#c0a880';
  c.font='9px Arial,sans-serif';
  c.textAlign='center';
  c.fillText(strukFooter,W/2,ty+68);
  if(phone){ c.fillStyle='#a09080'; c.fillText('WA/Tel: '+phone,W/2,ty+82); }
  c.fillStyle='#d4c0a8'; c.font='8px Arial,sans-serif';
  c.fillText(storeName+' • Daftar Harga Digital',W/2,ty+96);
}

function dash(c,x1,y1,x2,y2,col='#e8d9c0'){
  c.save(); c.strokeStyle=col; c.lineWidth=1; c.setLineDash([4,4]);
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); c.restore();
}

function rr(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y);
  c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

function clampText(c,t,max){ while(c.measureText(t).width>max&&t.length) t=t.slice(0,-1); return t; }

function downloadStruk(){
  drawStruk();
  const a=document.createElement('a');
  a.download='struk-'+new Date().toISOString().slice(0,10)+'.png';
  a.href=document.getElementById('strukCanvas').toDataURL('image/png');
  a.click();
  toast('Struk didownload ✓','ok');
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||''); el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
