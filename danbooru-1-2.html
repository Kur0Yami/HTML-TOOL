<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Danbooru Fetcher</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lime:#C9FF00;--lime2:#b3e600;--ink:#111;--white:#fff;
  --card-r:10px;--border:2.5px solid #111;
  --shadow:5px 5px 0 #111;--shadow-sm:3px 3px 0 #111;
  --font-h:'Fredoka One',cursive;--font:'Nunito',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--lime);min-height:100vh;color:var(--ink);overflow-x:hidden}

/* SHELL */
.shell{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 10px 80px}

/* HEADER */
.header{text-align:center;padding:16px 10px 10px}
.header h1{font-family:var(--font-h);font-size:clamp(1.4rem,4vw,2.4rem);line-height:1}
.header h1 span{color:#fff;text-shadow:3px 3px 0 var(--ink)}

/* SEARCH WRAP */
.search-wrap{background:#fff;border:var(--border);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.search-row{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap}
.tag-wrap{position:relative;flex:1 1 180px}
.field-label{font-weight:800;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:3px;display:block}
#tagInput{width:100%;padding:9px 12px;border:var(--border);border-radius:8px;font-family:var(--font);font-size:14px;font-weight:700;background:#fafafa;outline:none;transition:box-shadow .15s}
#tagInput:focus{box-shadow:var(--shadow-sm);background:#fff}

/* AUTOCOMPLETE — danbooru style */
.ac-box{
  position:absolute;top:calc(100% + 3px);left:0;right:0;
  background:#fff;border:2px solid #0073ff;
  border-top:none;border-radius:0 0 7px 7px;
  z-index:9999;display:none;max-height:320px;overflow-y:auto;
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}
.ac-item{display:flex;align-items:center;padding:6px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #f2f2f2;gap:8px;line-height:1.3}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:#e8f4ff}
.ac-name{flex:1;font-weight:400}
.ac-name b{font-weight:900}
.ac-count{font-size:11.5px;color:#aaa;font-weight:700;min-width:32px;text-align:right}
/* category colors (matching danbooru) */
.cat-0 .ac-name{color:#3a7a00}
.cat-1 .ac-name{color:#c0392b}
.cat-3 .ac-name{color:#8e44ad}
.cat-4 .ac-name{color:#1a6bb5}
.cat-5 .ac-name{color:#7f8c8d}

/* CONTROLS */
.ctrl-group{display:flex;flex-direction:column}
select.ctrl{padding:9px 10px;border:var(--border);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;background:#fafafa;cursor:pointer;min-width:120px;outline:none}
select.ctrl:focus{box-shadow:var(--shadow-sm)}
.btn-search{padding:10px 20px;background:var(--ink);color:var(--lime);border:var(--border);border-radius:8px;font-family:var(--font-h);font-size:.9rem;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s;white-space:nowrap}
.btn-search:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--lime2)}
.btn-search:active{transform:translate(2px,2px);box-shadow:none}

/* TOOLBAR */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:8px}

/* Grid S/M/L */
.gs-group{display:flex;border:var(--border);border-radius:7px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
.gs-btn{padding:6px 13px;background:#fff;border:none;border-right:2px solid #111;font-family:var(--font);font-weight:800;font-size:.78rem;cursor:pointer;transition:background .12s}
.gs-btn:last-child{border-right:none}
.gs-btn.active{background:var(--lime)}
.gs-btn:hover:not(.active){background:#f5f5f5}

/* Adv toggle */
.adv-toggle{background:#fff;border:var(--border);border-radius:7px;padding:6px 11px;font-family:var(--font);font-weight:800;font-size:.75rem;cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:5px}
.adv-toggle svg{transition:transform .2s}
.adv-toggle.open svg{transform:rotate(180deg)}

/* Status chip */
.status-chip{background:#fff;border:var(--border);border-radius:20px;padding:5px 12px;font-weight:800;font-size:.76rem;box-shadow:var(--shadow-sm)}
.status-chip span{color:#aaa;font-weight:600}

/* Buttons */
.btn-sm{padding:6px 12px;border:var(--border);border-radius:20px;font-family:var(--font);font-weight:800;font-size:.75rem;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .1s;white-space:nowrap}
.btn-sm:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #111}
.btn-sm:active{transform:translate(1px,1px);box-shadow:none}
.btn-lime{background:var(--lime);color:var(--ink)}
.btn-white{background:#fff;color:var(--ink)}
.btn-ink{background:var(--ink);color:var(--lime)}
.btn-danger{background:#f87171;color:#fff}

/* ADV FILTER PANEL */
.adv-panel{display:none;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin-bottom:10px;background:#fff;border:var(--border);border-radius:11px;box-shadow:var(--shadow-sm);padding:12px 14px}
.adv-panel.open{display:grid}
.adv-field label{font-weight:800;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:3px;display:block}
.adv-field input[type=text],.adv-field input[type=number]{width:100%;padding:7px 9px;border:var(--border);border-radius:6px;font-family:var(--font);font-size:13px;font-weight:700;background:#fafafa;outline:none}
.adv-field input:focus{box-shadow:var(--shadow-sm)}
.toggle-row{display:flex;align-items:center;gap:7px;margin-top:5px}
.toggle{position:relative;width:36px;height:19px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:#ddd;border:2px solid #111;border-radius:20px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-track{background:var(--lime)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:11px;height:11px;background:#111;border-radius:50%;transition:transform .2s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(17px)}
.toggle-label{font-weight:700;font-size:.78rem}

/* GALLERY */
.gallery{display:grid;gap:8px}
.gallery.size-s{grid-template-columns:repeat(3,1fr)}
.gallery.size-m{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.gallery.size-l{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

/* CARD */
.card{background:#fff;border:var(--border);border-radius:var(--card-r);box-shadow:var(--shadow-sm);overflow:hidden;position:relative;cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}
.card.done{outline:3px solid #4ade80;outline-offset:-1px}

/* Thumb */
.card-thumb{position:relative;aspect-ratio:1/1;overflow:hidden;background:#c8f000}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-thumb img{transform:scale(1.06)}

/* ALWAYS-VISIBLE DOWNLOAD BTN */
.thumb-dl{
  position:absolute;bottom:4px;right:4px;z-index:15;
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;
  transition:background .15s,transform .12s;
  color:#fff;user-select:none;
}
.thumb-dl:hover{background:var(--lime);border-color:#111;color:#111;transform:scale(1.15)}

/* Checkbox */
.card-cb{position:absolute;top:4px;left:4px;z-index:15;width:15px;height:15px;cursor:pointer;accent-color:var(--lime)}

/* Badges */
.badge{position:absolute;z-index:10;pointer-events:none;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:20px;border:1.5px solid #111;line-height:1.4}
.badge-top{top:4px;right:4px;background:#fff}
.badge-size{bottom:4px;left:4px}
.badge-done{bottom:4px;left:4px;background:#4ade80;color:#fff}
.size-g{background:#4ade80;color:#fff}
.size-y{background:#facc15;color:#111}
.size-r{background:#f87171;color:#fff}
.badge-rating{position:absolute;top:25px;left:4px;z-index:10;pointer-events:none;font-size:8.5px;font-weight:900;padding:2px 6px;border-radius:20px;border:1.5px solid #111;text-transform:uppercase}
.r-g{background:#4ade80;color:#fff}.r-s{background:#facc15;color:#111}.r-e{background:#f87171;color:#fff}.r-q{background:#fb923c;color:#fff}

/* Card footer */
.card-foot{padding:5px 6px 6px;border-top:1.5px solid #f0f0f0}
.cf-id{font-size:8.5px;font-weight:800;color:#ccc;text-transform:uppercase}
.cf-meta{font-size:9.5px;font-weight:800;color:#444;margin-top:1px}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.pg-btn{width:36px;height:36px;border:var(--border);border-radius:50%;background:#fff;font-size:1.15rem;cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);transition:transform .1s,background .12s}
.pg-btn:hover:not(:disabled){transform:translate(-2px,-2px);background:var(--lime)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.pg-info{background:#fff;border:var(--border);border-radius:20px;padding:6px 16px;font-family:var(--font-h);font-size:.88rem;box-shadow:var(--shadow-sm)}

/* SKELETON */
.skeleton{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.sk-thumb{background:#afe800;aspect-ratio:1/1}
.sk-line{background:#afe800;border-radius:4px;height:8px;margin:6px 7px}

/* PLACEHOLDER */
.placeholder{grid-column:1/-1;text-align:center;padding:40px 20px}
.ph-icon{font-size:2.4rem;margin-bottom:9px}
.placeholder h3{font-family:var(--font-h);font-size:1.1rem}
.placeholder p{color:#555;font-size:.82rem;margin-top:4px}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:14px}
.lb.open{display:flex}
.lb-close{position:absolute;top:12px;right:16px;color:#fff;cursor:pointer;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:34px;height:34px;font-size:1rem;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,.3)}
.lb-img-wrap{position:relative;max-width:90vw;max-height:70vh}
.lb-img-wrap img{max-width:90vw;max-height:70vh;object-fit:contain;border:2px solid #fff;border-radius:9px;display:block}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;border-radius:50%;width:38px;height:38px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-nav.prev{left:-50px}.lb-nav.next{right:-50px}
.lb-nav:hover{background:rgba(201,255,0,.8);color:#111}
.lb-info{text-align:center;color:#fff;margin-top:10px}
.lb-info h3{font-family:var(--font-h);font-size:.95rem}
.lb-info p{font-size:.72rem;color:#ccc;margin-top:2px}
.lb-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;max-width:640px;justify-content:center;max-height:65px;overflow-y:auto}
.lb-tag{background:rgba(255,255,255,.15);color:#fff;font-size:10.5px;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;font-family:var(--font);font-weight:700}
.lb-tag:hover{background:var(--lime);color:#111}
.lb-acts{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;justify-content:center}

/* TOAST */
#toast-ct{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:var(--lime);padding:8px 18px;border-radius:30px;font-family:var(--font);font-weight:800;font-size:.82rem;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:tIn .25s ease,tOut .25s ease 2.3s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px)}}

/* FAB */
.fab{position:fixed;bottom:18px;right:18px;width:46px;height:46px;background:var(--ink);color:var(--lime);border:var(--border);border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;z-index:800}
.settings-panel{position:fixed;bottom:74px;right:18px;width:250px;background:#fff;border:var(--border);border-radius:13px;box-shadow:var(--shadow);padding:14px;z-index:800;display:none;flex-direction:column;gap:8px}
.settings-panel.open{display:flex}
.settings-title{font-family:var(--font-h);font-size:.9rem;border-bottom:2px dashed #eee;padding-bottom:6px}
.settings-stat{font-size:.76rem;color:#888;font-weight:600;background:#f5f5f5;border-radius:7px;padding:7px 9px;line-height:1.7}
.settings-stat b{color:#111}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:10px}
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <h1>Danbooru <span>Fetcher</span></h1>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-row">
      <div class="tag-wrap">
        <label class="field-label" for="tagInput">🏷️ Tags (spasi=AND, -=exclude)</label>
        <input type="text" id="tagInput" placeholder="arknights 1girl …" autocomplete="off" value="wuthering_waves">
        <div class="ac-box" id="acBox"></div>
      </div>

      <div class="ctrl-group">
        <label class="field-label">📊 Urut</label>
        <select id="orderInput" class="ctrl">
          <option value="">Terbaru</option>
          <option value="order:score">⭐ Score</option>
          <option value="order:favcount">♡ Favorit</option>
          <option value="order:rank">🔥 Trending</option>
          <option value="order:views">👁 Views</option>
        </select>
      </div>

      <div class="ctrl-group">
        <label class="field-label">🔞 Rating</label>
        <select id="ratingInput" class="ctrl">
          <option value="rating:general">General ✅</option>
          <option value="rating:sensitive">Sensitive 🟡</option>
          <option value="rating:questionable">Questionable 🟠</option>
          <option value="rating:explicit">Explicit 🔴</option>
          <option value="">Semua</option>
        </select>
      </div>

      <button class="btn-search" onclick="startSearch()">🔍 Cari</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="gs-group">
      <button class="gs-btn active" id="gs-s" onclick="setGrid('s')">S</button>
      <button class="gs-btn"        id="gs-m" onclick="setGrid('m')">M</button>
      <button class="gs-btn"        id="gs-l" onclick="setGrid('l')">L</button>
    </div>
    <button class="adv-toggle" id="advToggle" onclick="toggleAdv()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      Filter
    </button>
    <div class="status-chip" id="statusChip" style="display:none">—</div>
    <button class="btn-sm btn-lime"  id="btnSelAll"  style="display:none" onclick="selectAll()">☑ Semua</button>
    <button class="btn-sm btn-white" id="btnDesel"   style="display:none" onclick="deselectAll()">☐ Batal</button>
    <button class="btn-sm btn-ink"   id="btnDlSel"   style="display:none" onclick="downloadSelected()">⬇️ DL Dipilih</button>
  </div>

  <!-- ADVANCED FILTER -->
  <div class="adv-panel" id="advPanel">
    <div class="adv-field">
      <label>🏷️ Tag Filter (must, -excl, ~atau)</label>
      <input type="text" id="tagFilterInput" placeholder="-nsfw ~solo">
    </div>
    <div class="adv-field">
      <label>📏 Ukuran Min (MB)</label>
      <input type="number" id="sizeMin" value="0" min="0" step="0.5">
    </div>
    <div class="adv-field">
      <label>📏 Ukuran Maks (MB)</label>
      <input type="number" id="sizeMax" value="9999" min="0" step="0.5">
    </div>
    <div class="adv-field">
      <label>⚙️ Opsi</label>
      <div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="togSize" checked onchange="savePref()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
        <span class="toggle-label">Tampilkan ukuran file</span>
      </div>
      <div class="toggle-row" style="margin-top:7px">
        <label class="toggle"><input type="checkbox" id="togHideDone" onchange="applyFilter()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
        <span class="toggle-label">Sembunyikan yg sudah DL</span>
      </div>
      <div style="margin-top:8px">
        <button class="btn-sm btn-lime" style="width:100%" onclick="applyFilter()">✅ Terapkan Filter</button>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="gallery size-s" id="gallery">
    <div class="placeholder">
      <div class="ph-icon">🌸</div>
      <h3>Siap mencari!</h3>
      <p>Masukkan tag lalu klik Cari.</p>
    </div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination" style="display:none">
    <button class="pg-btn" id="pgPrev" onclick="goPage(currentPage-1)">‹</button>
    <div class="pg-info" id="pgInfo">Hal. 1</div>
    <button class="pg-btn" id="pgNext" onclick="goPage(currentPage+1)">›</button>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="lbBgClick(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="">
    <button class="lb-nav prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
    <button class="lb-nav next" onclick="lbNav(+1);event.stopPropagation()">›</button>
  </div>
  <div class="lb-info">
    <h3 id="lbTitle"></h3>
    <p id="lbMeta"></p>
    <div class="lb-tags" id="lbTags"></div>
    <div class="lb-acts">
      <button class="btn-sm btn-lime"  onclick="lbDl()">⬇️ Unduh</button>
      <button class="btn-sm btn-white" onclick="lbOpen()">🔗 Danbooru</button>
      <button class="btn-sm btn-white" onclick="closeLb()">✕ Tutup</button>
    </div>
  </div>
</div>

<div id="toast-ct"></div>

<button class="fab" id="fabBtn" onclick="toggleSettings()">⚙️</button>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">⚙️ Settings</div>
  <div class="settings-stat" id="gmStat">—</div>
  <button class="btn-sm btn-ink" onclick="installBridge()" style="width:100%" id="btnInstallBridge">📦 Install GM Bridge</button>
  <div style="height:1px;background:#eee"></div>
  <div class="settings-title" style="font-size:.78rem">Riwayat Download</div>
  <div class="settings-stat" id="settingsStat">—</div>
  <button class="btn-sm btn-lime"   onclick="exportHistory()" style="width:100%">📤 Export JSON</button>
  <button class="btn-sm btn-white"  onclick="importHistory()" style="width:100%">📥 Import JSON</button>
  <button class="btn-sm btn-danger" onclick="clearHistory()"  style="width:100%">🗑️ Hapus Riwayat</button>
</div>

<script>
/* ═══════════════════════════
   STATE & CONSTANTS
═══════════════════════════ */
const DL_KEY   = "db_dl_v2";
const PREF_KEY = "db_pref_v2";

// S=3cols×7rows=21, M=~5cols×5rows=25, L=~7cols×4rows=28
const GRID = {
  s:{ cls:"size-s", perPage:21 },
  m:{ cls:"size-m", perPage:25 },
  l:{ cls:"size-l", perPage:28 },
};

let downloadedSet = new Set(JSON.parse(localStorage.getItem(DL_KEY)||"[]"));
let prefs = JSON.parse(localStorage.getItem(PREF_KEY)||'{"showSize":true}');

let curPosts   = [];
let currentPage = 1;
let curGrid    = "s";
let hasNext    = false;
let lbIdx      = 0;
let acTimer    = null;
let acData     = [];
let acSel      = -1;
let settingsOpen=false;

/* ═══════════════════════════
   PERSIST
═══════════════════════════ */
function saveDL(){ localStorage.setItem(DL_KEY, JSON.stringify([...downloadedSet])); }
function savePref(){ prefs.showSize=document.getElementById("togSize").checked; localStorage.setItem(PREF_KEY,JSON.stringify(prefs)); }
function loadPrefs(){ document.getElementById("togSize").checked=!!prefs.showSize; }

/* ═══════════════════════════
   UTILS
═══════════════════════════ */
function fmtBytes(b){
  if(!b) return null;
  if(b<1048576) return (b/1024).toFixed(1)+" KB";
  return (b/1048576).toFixed(2)+" MB";
}
function toMB(b){ return (b||0)/1048576; }
function scls(mb){ return mb>=5?"size-r":mb>=2?"size-y":"size-g"; }
function rcls(r){ return {g:"r-g",s:"r-s",e:"r-e",q:"r-q"}[r]||"r-q"; }
function rlbl(r){ return {g:"G",s:"S",e:"E",q:"Q"}[r]||(r||"?").toUpperCase(); }
function norm(u){ try{const x=new URL(u);x.search="";x.hash="";return x.href;}catch{return u;} }
function fmtN(n){ return (n||0)>=1000?((n||0)/1000).toFixed(1)+"k":String(n||0); }

function toast(msg,dur=2500){
  const c=document.getElementById("toast-ct"),t=document.createElement("div");
  t.className="toast"; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),dur+300);
}

/* ═══════════════════════════
   GRID SIZE
═══════════════════════════ */
function setGrid(size){
  curGrid=size;
  const g=document.getElementById("gallery");
  Object.keys(GRID).forEach(k=>{
    g.classList.remove(GRID[k].cls);
    document.getElementById("gs-"+k).classList.toggle("active",k===size);
  });
  g.classList.add(GRID[size].cls);
}

/* ═══════════════════════════
   AUTOCOMPLETE
═══════════════════════════ */
const tagEl = document.getElementById("tagInput");
const acBox = document.getElementById("acBox");

tagEl.addEventListener("input",()=>{
  clearTimeout(acTimer);
  const last = getLastWord().replace(/^[-~]/,"");
  if(last.length<1){ closeAc(); return; }
  acTimer=setTimeout(()=>fetchAc(last),200);
});

tagEl.addEventListener("keydown",e=>{
  const items=acBox.querySelectorAll(".ac-item");
  if(e.key==="ArrowDown"){ acSel=Math.min(acSel+1,items.length-1); hiAc(items); e.preventDefault(); }
  else if(e.key==="ArrowUp"){ acSel=Math.max(acSel-1,0); hiAc(items); e.preventDefault(); }
  else if(e.key==="Enter"){
    if(acSel>=0&&items[acSel]){ applyAcItem(acData[acSel]); e.preventDefault(); }
    else{ startSearch(); closeAc(); e.preventDefault(); }
  }
  else if(e.key==="Escape") closeAc();
});
document.addEventListener("click",e=>{ if(!acBox.contains(e.target)&&e.target!==tagEl) closeAc(); });

function getLastWord(){ const w=tagEl.value.split(/\s+/); return w[w.length-1]; }

async function fetchAc(q){
  try{
    const r=await fetch(`https://danbooru.donmai.us/tags/autocomplete.json?search[name_matches]=${encodeURIComponent(q)}*&limit=20&only=name,post_count,category`);
    if(!r.ok) return;
    acData=await r.json();
    renderAc(acData,q);
  }catch{}
}

function renderAc(data,query){
  if(!data.length){ closeAc(); return; }
  acBox.innerHTML=""; acSel=-1;
  data.forEach((t,i)=>{
    const el=document.createElement("div");
    el.className=`ac-item cat-${t.category}`;
    // Highlight matched portion bold
    const name=t.name||"", q=(query||"").toLowerCase();
    const idx=name.toLowerCase().indexOf(q);
    let dn=name;
    if(idx>=0) dn=name.slice(0,idx)+`<b>${name.slice(idx,idx+q.length)}</b>`+name.slice(idx+q.length);
    el.innerHTML=`<span class="ac-name">${dn}</span><span class="ac-count">${fmtN(t.post_count)}</span>`;
    el.onmouseenter=()=>{ acSel=i; hiAc(acBox.querySelectorAll(".ac-item")); };
    el.onclick=()=>applyAcItem(t);
    acBox.appendChild(el);
  });
  acBox.style.display="block";
}

function hiAc(items){ items.forEach((el,i)=>el.classList.toggle("sel",i===acSel)); }

function applyAcItem(t){
  const raw=tagEl.value, words=raw.split(/\s+/);
  const lastRaw=words[words.length-1];
  const prefix=lastRaw.match(/^[-~]/)?.[0]||"";
  words[words.length-1]=prefix+t.name;
  tagEl.value=words.join(" ")+" ";
  closeAc(); tagEl.focus();
}
function closeAc(){ acBox.style.display="none"; acSel=-1; }

/* ═══════════════════════════
   BUILD TAGS
═══════════════════════════ */
function buildTags(){
  const tag=tagEl.value.trim();
  const order=document.getElementById("orderInput").value;
  const rating=document.getElementById("ratingInput").value;
  return [tag,order,rating].filter(Boolean).join(" ");
}

/* ═══════════════════════════
   SEARCH / FETCH
═══════════════════════════ */
async function startSearch(){ closeAc(); currentPage=1; await fetchRender(); }

async function goPage(p){
  if(p<1||(p>currentPage&&!hasNext)) return;
  currentPage=p;
  await fetchRender();
  window.scrollTo({top:0,behavior:"smooth"});
}

async function fetchRender(){
  const g=document.getElementById("gallery");
  g.innerHTML=""; showSkel(g);
  document.getElementById("pagination").style.display="none";

  const perPage=GRID[curGrid].perPage;
  const tags=buildTags();

  try{
    const url=`https://danbooru.donmai.us/posts.json?tags=${encodeURIComponent(tags)}&limit=${perPage+1}&page=${currentPage}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    g.innerHTML="";

    hasNext=data.length>perPage;
    curPosts=hasNext?data.slice(0,perPage):data;

    if(!curPosts.length){
      g.innerHTML=`<div class="placeholder"><div class="ph-icon">😕</div><h3>Tidak ada hasil</h3><p>Coba tag lain.</p></div>`;
      return;
    }

    curPosts.forEach((post,i)=>{
      if(post.file_url||post.preview_file_url) g.appendChild(makeCard(post,i));
    });

    // show toolbar
    ["statusChip","btnSelAll","btnDesel","btnDlSel"].forEach(id=>document.getElementById(id).style.display="");
    document.getElementById("statusChip").innerHTML=`<b>${curPosts.length}</b> gambar <span>· Hal. ${currentPage}</span>`;

    // pagination
    const pg=document.getElementById("pagination");
    pg.style.display="flex";
    document.getElementById("pgPrev").disabled=currentPage<=1;
    document.getElementById("pgNext").disabled=!hasNext;
    document.getElementById("pgInfo").textContent=`Hal. ${currentPage}`;

  }catch(e){
    g.innerHTML=`<div class="placeholder"><div class="ph-icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

function showSkel(g,n=6){
  for(let i=0;i<n;i++){
    const s=document.createElement("div");
    s.className="card skeleton";
    s.innerHTML=`<div class="sk-thumb"></div><div class="sk-line" style="width:60%"></div><div class="sk-line" style="width:40%"></div>`;
    g.appendChild(s);
  }
}

/* ═══════════════════════════
   MAKE CARD
═══════════════════════════ */
/* ═══════════════════════════
   CDN URL BUILDER (danbooru style)
   construct: cdn.donmai.us/original/aa/bb/__char__copy__drawn_by_artist__md5.ext?download=1
   IDM baca filename dari path URL → nama rapih otomatis
═══════════════════════════ */
function buildDlUrl(post){
  const md5   = post.md5||"";
  const ext   = post.file_ext||"jpg";
  const dir   = md5.length>=4?`${md5.slice(0,2)}/${md5.slice(2,4)}`:"00/00";
  const chars = (post.tag_string_character||"").split(" ").filter(Boolean).slice(0,3).join("_");
  const copy  = (post.tag_string_copyright||"").split(" ").filter(Boolean).slice(0,1).join("_");
  const arts  = (post.tag_string_artist||"").split(" ").filter(Boolean).slice(0,2);
  const drawn = arts.length?"drawn_by_"+arts.join("_"):"";
  const parts = [chars,copy,drawn].filter(Boolean);
  const fname = parts.length?`__${parts.join("_")}__${md5}.${ext}`:`${md5}.${ext}`;
  return `https://cdn.donmai.us/original/${dir}/${fname}?download=1`;
}

function buildFname(post){
  const chars  =(post.tag_string_character||"").split(" ").filter(Boolean).slice(0,3).join("_");
  const copy   =(post.tag_string_copyright||"").split(" ").filter(Boolean).slice(0,1).join("_");
  const artists=(post.tag_string_artist||"").split(" ").filter(Boolean).slice(0,2);
  const drawn  =artists.length?"drawn_by_"+artists.join("_"):"";
  const md5    =post.md5||String(post.id);
  const ext    =post.file_ext||"jpg";
  const parts  =[chars,copy,drawn].filter(Boolean);
  return(parts.length?`__${parts.join("_")}__`:"")+`${md5}.${ext}`;
}

function makeCard(post,idx){
  const card=document.createElement("div");
  card.className="card";

  const isDone=downloadedSet.has(norm(post.file_url||""));
  if(isDone) card.classList.add("done");

  const mb=toMB(post.file_size);
  const sizeStr=fmtBytes(post.file_size);
  const rating=post.rating||"q";
  const thumb=post.preview_file_url||post.large_file_url||post.file_url||"";
  const showSz=document.getElementById("togSize").checked;

  // bottom-left badge: done > size > nothing
  const blBadge=isDone
    ?`<span class="badge badge-done">✓ DL</span>`
    :(sizeStr&&showSz?`<span class="badge badge-size ${scls(mb)}">${sizeStr}</span>`:"");

  card.innerHTML=`
    <div class="card-thumb">
      <img src="${thumb}" alt="" loading="lazy">
      <input type="checkbox" class="card-cb" title="Pilih">
      <span class="badge badge-top">⭐${fmtN(post.score)} ♡${fmtN(post.fav_count)}</span>
      <span class="badge-rating ${rcls(rating)}">${rlbl(rating)}</span>
      ${blBadge}
      <div class="thumb-dl" title="Unduh">⬇</div>
    </div>
    <div class="card-foot">
      <div class="cf-id">#${post.id}</div>
      <div class="cf-meta">${(post.file_ext||"jpg").toUpperCase()} · ${post.image_width}×${post.image_height}</div>
    </div>`;

  card.dataset.idx  =idx;
  card.dataset.id   =post.id;
  card.dataset.tags =post.tag_string||"";
  card.dataset.url  =post.file_url||"";
  card.dataset.dlurl=buildDlUrl(post);
  card.dataset.fname=buildFname(post);
  card.dataset.size =post.file_size||0;

  // Checkbox — don't bubble click
  card.querySelector(".card-cb").onclick=e=>e.stopPropagation();

  // Download btn — always visible, don't bubble
  card.querySelector(".thumb-dl").onclick=e=>{ e.stopPropagation(); dlCard(card); };

  // Card click → lightbox
  card.onclick=()=>openLb(idx);
  return card;
}

/* ═══════════════════════════
   IN-PAGE FILTER
═══════════════════════════ */
function parseQ(q){
  const must=[],excl=[],opt=[];
  (q||"").split(/\s+/).forEach(t=>{
    if(!t) return;
    if(t.startsWith("-")) excl.push(t.slice(1).toLowerCase());
    else if(t.startsWith("~")) opt.push(t.slice(1).toLowerCase());
    else must.push(t.toLowerCase());
  });
  return{must,excl,opt};
}

function applyFilter(){
  const tagQ=document.getElementById("tagFilterInput").value;
  const minMB=parseFloat(document.getElementById("sizeMin").value)||0;
  const maxMB=parseFloat(document.getElementById("sizeMax").value)||9999;
  const hideDone=document.getElementById("togHideDone").checked;
  const q=parseQ(tagQ);
  let shown=0,hidden=0;

  document.querySelectorAll("#gallery .card").forEach(card=>{
    const tags=(card.dataset.tags||"").toLowerCase().split(" ");
    const mb=toMB(parseInt(card.dataset.size||0));
    const done=card.classList.contains("done");

    let tagOk=true;
    if(q.must.length) tagOk=q.must.every(t=>tags.includes(t));
    if(tagOk&&q.excl.length) tagOk=!q.excl.some(t=>tags.includes(t));
    if(tagOk&&q.opt.length) tagOk=q.opt.some(t=>tags.includes(t));

    const sizeOk=mb===0||(mb>=minMB&&mb<=maxMB);
    const show=tagOk&&sizeOk&&!(hideDone&&done);
    card.style.display=show?"":"none";
    show?shown++:hidden++;
  });

  if(tagQ||minMB>0||maxMB<9999) toast(`Filter: ${shown} tampil, ${hidden} disembunyikan`);
}

function toggleAdv(){
  const p=document.getElementById("advPanel"),t=document.getElementById("advToggle");
  const o=p.classList.toggle("open");
  t.classList.toggle("open",o);
}

/* ═══════════════════════════
   SELECT & BATCH DL
═══════════════════════════ */
function selectAll(){
  document.querySelectorAll("#gallery .card").forEach(c=>{
    if(c.style.display!=="none"){const cb=c.querySelector(".card-cb");if(cb)cb.checked=true;}
  });
  toast("☑ Semua dipilih");
}
function deselectAll(){
  document.querySelectorAll("#gallery .card .card-cb").forEach(cb=>cb.checked=false);
  toast("☐ Seleksi dibatalkan");
}
async function downloadSelected(){
  const sel=[...document.querySelectorAll("#gallery .card")].filter(c=>{const cb=c.querySelector(".card-cb");return cb&&cb.checked;});
  if(!sel.length){ toast("⚠️ Pilih gambar dulu!"); return; }
  toast(`⬇️ Mengunduh ${sel.length} gambar…`,4000);
  for(let i=0;i<sel.length;i++){
    if(!sel[i].dataset.url) continue;
    await new Promise(r=>setTimeout(r,i===0?0:500));
    await dlCard(sel[i]);
  }
}

/* ═══════════════════════════
   DOWNLOAD
═══════════════════════════ */
function dlCard(card){
  const dlUrl=card.dataset.dlurl||card.dataset.url;
  const url  =card.dataset.url;
  const name =card.dataset.fname;
  if(!dlUrl){ toast("⚠️ URL tidak tersedia"); return; }
  if(gmAvail()){
    window._GM_dl(dlUrl, name,
      ()=>{ toast(`✅ ${name}`); markDone(card,url); },
      (e)=>{ toast(`❌ GM error: ${(e&&e.error)||"?"}`); }
    );
  } else {
    const a=document.createElement("a");
    a.href=dlUrl;
    document.body.appendChild(a); a.click(); a.remove();
    toast(`⬇️ ${name}`);
    markDone(card,url);
  }
}

function markDone(card,url){
  downloadedSet.add(norm(url)); saveDL();
  card.classList.add("done");
  const th=card.querySelector(".card-thumb");
  if(!th.querySelector(".badge-done")){
    th.querySelector(".badge-size")?.remove();
    const b=document.createElement("span");
    b.className="badge badge-done"; b.textContent="✓ DL";
    th.appendChild(b);
  }
  updateStat();
}

/* ═══════════════════════════
   LIGHTBOX
═══════════════════════════ */
function openLb(idx){ lbIdx=idx; showLb(idx); document.getElementById("lb").classList.add("open"); document.body.style.overflow="hidden"; }

function showLb(idx){
  const post=curPosts[idx]; if(!post) return;
  lbIdx=idx;
  const url=post.file_url||post.large_file_url||post.preview_file_url||"";
  document.getElementById("lbImg").src=url;
  document.getElementById("lbTitle").textContent=`#${post.id} · ${(post.file_ext||"").toUpperCase()} · ${post.image_width}×${post.image_height}`;
  document.getElementById("lbMeta").textContent=`⭐${post.score}  ♡${post.fav_count}  ${fmtBytes(post.file_size)||""}  [${rlbl(post.rating)}]`;
  const tc=document.getElementById("lbTags"); tc.innerHTML="";
  (post.tag_string||"").split(" ").filter(Boolean).slice(0,50).forEach(t=>{
    const b=document.createElement("button");
    b.className="lb-tag"; b.textContent=t;
    b.onclick=()=>{ tagEl.value=t+" "; closeLb(); startSearch(); };
    tc.appendChild(b);
  });
}

function lbNav(dir){ const n=lbIdx+dir; if(n>=0&&n<curPosts.length) showLb(n); }
function lbDl(){ const c=document.querySelectorAll("#gallery .card")[lbIdx]; if(c) dlCard(c); }
function lbOpen(){ const p=curPosts[lbIdx]; if(p) window.open(`https://danbooru.donmai.us/posts/${p.id}`,"_blank"); }
function closeLb(){ document.getElementById("lb").classList.remove("open"); document.body.style.overflow=""; document.getElementById("lbImg").src=""; }
function lbBgClick(e){ if(e.target===document.getElementById("lb")) closeLb(); }

document.addEventListener("keydown",e=>{
  if(!document.getElementById("lb").classList.contains("open")) return;
  if(e.key==="ArrowLeft") lbNav(-1);
  if(e.key==="ArrowRight") lbNav(+1);
  if(e.key==="Escape") closeLb();
});

   GM BRIDGE
═══════════════════════════ */
const GM_BRIDGE_SRC=`// ==UserScript==
// @name         Danbooru Fetcher - GM Bridge
// @namespace    https://kur0yami.github.io/
// @version      1.0
// @description  Silent GM_download bridge untuk Danbooru Fetcher HTML tool
// @match        file://*danbooru*.html
// @match        https://kur0yami.github.io/HTML-TOOL/danbooru*.html
// @grant        GM_download
// @grant        unsafeWindow
// @connect      cdn.donmai.us
// @run-at       document-end
// ==/UserScript==
(function(){
unsafeWindow._GM_dl=function(url,name,ok,err){
  GM_download({url:url,name:name,saveAs:false,
    onload:function(){if(ok)ok();},
    onerror:function(e){if(err)err(e);}
  });
};
console.log("[GM Bridge] ready");
})();`;

function gmAvail(){ return typeof window._GM_dl==="function"; }

function updateGMStat(){
  const el=document.getElementById("gmStat");
  const btn=document.getElementById("btnInstallBridge");
  if(!el) return;
  if(gmAvail()){
    el.innerHTML=`<span style="color:#4ade80">●</span> GM Bridge: <b>Aktif</b> — silent download ✅`;
    if(btn) btn.style.display="none";
  } else {
    el.innerHTML=`<span style="color:#f87171">●</span> GM Bridge: <b>Belum aktif</b><br><small style="color:#aaa">Install → reload halaman</small>`;
    if(btn) btn.style.display="";
  }
}

function installBridge(){
  const blob=new Blob([GM_BRIDGE_SRC],{type:"text/javascript"});
  const url=URL.createObjectURL(blob);
  window.open(url,"_blank");
  setTimeout(()=>URL.revokeObjectURL(url),8000);
  toast("📦 Install di Tampermonkey → lalu reload halaman ini",5000);
}

/* ═══════════════════════════
   SETTINGS
═══════════════════════════ */
function toggleSettings(){ settingsOpen=!settingsOpen; document.getElementById("settingsPanel").classList.toggle("open",settingsOpen); updateStat(); updateGMStat(); }
document.addEventListener("click",e=>{
  if(settingsOpen&&!document.getElementById("settingsPanel").contains(e.target)&&e.target!==document.getElementById("fabBtn")){
    settingsOpen=false; document.getElementById("settingsPanel").classList.remove("open");
  }
});
function updateStat(){ document.getElementById("settingsStat").innerHTML=`DL tercatat: <b>${downloadedSet.size}</b> URL`; }

function exportHistory(){
  const d={app:"Danbooru Fetcher",exported:new Date().toISOString(),count:downloadedSet.size,urls:[...downloadedSet]};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
  a.download=`danbooru_history_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast(`📤 Export: ${downloadedSet.size} URL`);
}
function importHistory(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        const items=Array.isArray(p)?p:(p.urls||[]);
        let added=0;
        items.forEach(u=>{ if(!downloadedSet.has(u)){downloadedSet.add(u);added++;} });
        saveDL();
        document.querySelectorAll("#gallery .card").forEach(c=>{ if(downloadedSet.has(norm(c.dataset.url))) markDone(c,c.dataset.url); });
        toast(`📥 Import: +${added} URL`); updateStat();
      }catch{ toast("⚠️ File tidak valid"); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function clearHistory(){
  if(!confirm(`Hapus ${downloadedSet.size} riwayat?`)) return;
  downloadedSet.clear(); saveDL();
  document.querySelectorAll("#gallery .card").forEach(c=>{ c.classList.remove("done"); c.querySelector(".badge-done")?.remove(); });
  updateStat(); toast("🗑️ Riwayat dihapus");
}

/* ═══════════════════════════
   INIT
═══════════════════════════ */
loadPrefs();
updateStat();
updateGMStat();
setGrid("s");
startSearch();
</script>
