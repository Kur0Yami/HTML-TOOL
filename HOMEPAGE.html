<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Glass New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --glass: rgba(255,255,255,0.08);
  --glass-b: rgba(255,255,255,0.14);
  --blur: 20px;
  --text: rgba(255,255,255,0.93);
  --muted: rgba(255,255,255,0.45);
}

html, body {
  width: 100%; height: 100%;
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  background: #080810;
}

/* ── BACKGROUND ── */
#bg-img {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover;
  background-position: center;
  transition: background-image .5s;
}
#bg-video {
  position: fixed; inset: 0; z-index: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
}
.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.38);
}

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 2;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 48px 20px 28px;
}

/* ── CLOCK ── */
#clock-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: up .6s ease both;
}
#clock {
  font-family: 'Space Mono', monospace;
  font-size: clamp(60px, 18vw, 96px);
  color: var(--text);
  letter-spacing: -3px;
  line-height: 1;
  text-shadow: 0 4px 40px rgba(0,0,0,0.5);
}
#date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 300;
}

/* ── MIDDLE (search) ── */
#mid {
  width: 100%;
  max-width: 500px;
  animation: up .6s .1s ease both;
}
#search-row {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
#search-row:focus-within {
  border-color: rgba(255,255,255,0.35);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
#search {
  flex: 1;
  padding: 14px 18px;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 300;
  outline: none;
  min-width: 0;
}
#search::placeholder { color: var(--muted); }
#search-btn {
  padding: 0 16px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: color .2s;
  flex-shrink: 0;
}
#search-btn:hover { color: var(--text); }

/* ── BOTTOM ── */
#bottom {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  animation: up .6s .2s ease both;
}

/* ── BOOKMARKS ── */
#bookmarks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 500px;
}
.bm {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  font-weight: 300;
  transition: background .2s, transform .15s;
  position: relative;
}
.bm:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }
.bm img { width: 15px; height: 15px; object-fit: contain; border-radius: 3px; flex-shrink: 0; }
.bm-del {
  display: none;
  position: absolute;
  top: -6px; right: -6px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255,80,80,0.85);
  color: #fff;
  font-size: 9px;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  line-height: 1;
}
.bm:hover .bm-del { display: flex; }

/* ── ADD ROW ── */
#add-row {
  display: flex;
  gap: 7px;
  align-items: center;
  width: 100%;
  max-width: 500px;
}
#add-row input {
  flex: 1;
  padding: 9px 13px;
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  min-width: 0;
  transition: border-color .2s;
}
#add-row input::placeholder { color: var(--muted); }
#add-row input:focus { border-color: rgba(255,255,255,0.3); }
#add-row button {
  padding: 9px 15px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .2s;
}
#add-row button:hover { background: rgba(255,255,255,0.2); }

/* ── SETTINGS ── */
#gear {
  position: fixed;
  bottom: 18px; right: 18px; z-index: 10;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .2s, transform .3s;
}
#gear:hover { color: var(--text); transform: rotate(70deg); }

#panel {
  position: fixed;
  bottom: 64px; right: 16px; z-index: 10;
  width: min(300px, calc(100vw - 32px));
  background: rgba(14,14,22,0.82);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 20px;
  padding: 18px;
  display: none;
  flex-direction: column;
  gap: 14px;
}
#panel.open { display: flex; animation: pop .2s ease; }
#panel h3 {
  font-size: 11px; font-weight: 600;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.p-row { display: flex; flex-direction: column; gap: 6px; }
.p-row label { font-size: 12px; color: var(--muted); }
.p-row input[type=url], .p-row input[type=text] {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  outline: none;
}
.p-row input:focus { border-color: rgba(255,255,255,0.28); }
.p-btn {
  padding: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: background .2s;
  text-align: center;
}
.p-btn:hover { background: rgba(255,255,255,0.18); }
.p-file { display: none; }
.eng-row { display: flex; gap: 5px; flex-wrap: wrap; }
.eng {
  flex: 1; min-width: 56px;
  padding: 6px 4px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--muted);
  font-size: 11px;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.eng.on { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); color: var(--text); }
.hr { height: 1px; background: rgba(255,255,255,0.07); }

/* ── TOAST ── */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(30,30,40,0.9);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 10px 18px;
  color: var(--text);
  font-size: 13px;
  z-index: 99;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#toast.show { opacity: 1; }

@keyframes up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
  from { opacity: 0; transform: scale(.95) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>

<div id="bg-img"></div>
<video id="bg-video" autoplay muted loop playsinline></video>
<div class="overlay"></div>

<div id="app">
  <div id="clock-wrap">
    <div id="clock">00:00</div>
    <div id="date">—</div>
  </div>

  <div id="mid">
    <div id="search-row">
      <input id="search" type="text" placeholder="Cari atau ketik URL..." autocomplete="off" spellcheck="false">
      <button id="search-btn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div id="bottom">
    <div id="bookmarks"></div>
    <div id="add-row">
      <input id="bm-n" type="text" placeholder="Nama">
      <input id="bm-u" type="text" placeholder="URL">
      <button id="add-bm">+ Tambah</button>
    </div>
  </div>
</div>

<!-- Gear -->
<button id="gear" title="Pengaturan">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<!-- Settings Panel -->
<div id="panel">
  <h3>⚙ Pengaturan</h3>

  <div class="p-row">
    <label>🖼 Background — URL gambar/video</label>
    <input id="bg-url" type="url" placeholder="https://... (.jpg/.png/.webm/.mp4)">
    <button class="p-btn" onclick="applyBgUrl()">Terapkan</button>
  </div>

  <div class="p-row">
    <label>📁 Upload dari HP (gambar atau video)</label>
    <label class="p-btn" for="bg-file" style="cursor:pointer">Pilih File</label>
    <input id="bg-file" type="file" class="p-file" accept="image/*,video/*">
  </div>

  <div class="hr"></div>

  <div class="p-row">
    <label>🔍 Mesin Pencari</label>
    <div class="eng-row">
      <button class="eng on" data-url="https://www.google.com/search?q=">Google</button>
      <button class="eng" data-url="https://www.bing.com/search?q=">Bing</button>
      <button class="eng" data-url="https://duckduckgo.com/?q=">DDG</button>
      <button class="eng" data-url="https://search.brave.com/search?q=">Brave</button>
    </div>
  </div>

  <div class="hr"></div>

  <div class="p-row">
    <button class="p-btn" onclick="resetAll()" style="color:rgba(255,100,100,.8)">🗑 Reset semua</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATA ──
const DEF = {
  bgUrl: '', bgLocal: '', bgType: 'img',
  engine: 'https://www.google.com/search?q=',
  bookmarks: [
    { n:'YouTube', u:'https://youtube.com' },
    { n:'Twitter', u:'https://x.com' },
    { n:'GitHub',  u:'https://github.com' },
  ]
};

let S = { ...DEF };
try { const r = localStorage.getItem('gntd2'); if(r) S = { ...DEF, ...JSON.parse(r) }; } catch(e){}

const save = () => localStorage.setItem('gntd2', JSON.stringify(S));

// ── CLOCK ──
const D = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const M = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.getElementById('date').textContent =
    `${D[n.getDay()]}, ${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(tick, 1000); tick();

// ── BACKGROUND ──
const bgImg = document.getElementById('bg-img');
const bgVid = document.getElementById('bg-video');

function applyBg() {
  const url = S.bgLocal || S.bgUrl;
  if (!url) return;
  const isVideo = /\.(webm|mp4|ogg)(\?.*)?$/i.test(url) || S.bgType === 'video';
  if (isVideo) {
    bgVid.src = url;
    bgVid.style.display = 'block';
    bgImg.style.backgroundImage = '';
  } else {
    bgImg.style.backgroundImage = `url('${url}')`;
    bgVid.style.display = 'none';
    bgVid.src = '';
  }
}

function applyBgUrl() {
  const v = document.getElementById('bg-url').value.trim();
  if (!v) return;
  S.bgUrl = v; S.bgLocal = '';
  S.bgType = /\.(webm|mp4|ogg)(\?.*)?$/i.test(v) ? 'video' : 'img';
  applyBg(); save();
  toast('Background diterapkan!');
}

document.getElementById('bg-file').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    S.bgLocal = ev.target.result;
    S.bgUrl = '';
    S.bgType = f.type.startsWith('video') ? 'video' : 'img';
    applyBg(); save();
    toast('Background diupload!');
  };
  r.readAsDataURL(f);
});

// ── SEARCH ──
function doSearch() {
  const q = document.getElementById('search').value.trim();
  if (!q) return;
  window.location.href = /^https?:\/\//.test(q)
    ? q
    : /^[\w-]+\.\w{2,}(\/|$)/.test(q)
      ? 'https://' + q
      : S.engine + encodeURIComponent(q);
}
document.getElementById('search').addEventListener('keydown', e => e.key==='Enter' && doSearch());
document.getElementById('search-btn').addEventListener('click', doSearch);

// ── ENGINE ──
document.querySelectorAll('.eng').forEach(btn => {
  if (btn.dataset.url === S.engine) btn.classList.add('on');
  else btn.classList.remove('on');
  btn.addEventListener('click', () => {
    S.engine = btn.dataset.url; save();
    document.querySelectorAll('.eng').forEach(b => b.classList.toggle('on', b===btn));
  });
});

// ── BOOKMARKS ──
function renderBM() {
  const wrap = document.getElementById('bookmarks');
  wrap.innerHTML = '';
  S.bookmarks.forEach((bm, i) => {
    const domain = (() => { try { return new URL(bm.u).hostname; } catch(e){ return ''; } })();
    const a = document.createElement('a');
    a.className = 'bm';
    a.href = bm.u;
    a.innerHTML = `
      <img src="https://www.google.com/s2/favicons?sz=32&domain=${domain}" onerror="this.style.display='none'">
      <span>${bm.n}</span>
      <span class="bm-del" data-i="${i}">✕</span>
    `;
    a.querySelector('.bm-del').addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      S.bookmarks.splice(i,1); save(); renderBM();
    });
    wrap.appendChild(a);
  });
}

document.getElementById('add-bm').addEventListener('click', () => {
  const n = document.getElementById('bm-n').value.trim();
  let u = document.getElementById('bm-u').value.trim();
  if (!n || !u) return toast('Isi nama dan URL!');
  if (!/^https?:\/\//.test(u)) u = 'https://' + u;
  S.bookmarks.push({ n, u }); save(); renderBM();
  document.getElementById('bm-n').value = '';
  document.getElementById('bm-u').value = '';
  toast('Bookmark ditambahkan!');
});
['bm-n','bm-u'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e =>
    e.key==='Enter' && document.getElementById('add-bm').click()
  )
);

// ── PANEL ──
const panel = document.getElementById('panel');
document.getElementById('gear').addEventListener('click', e => {
  e.stopPropagation(); panel.classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!panel.contains(e.target)) panel.classList.remove('open');
});

// ── RESET ──
function resetAll() {
  if (!confirm('Reset semua data?')) return;
  localStorage.removeItem('gntd2'); location.reload();
}

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
applyBg();
renderBM();
if (S.bgUrl) document.getElementById('bg-url').value = S.bgUrl;
document.getElementById('search').focus();
</script>
</body>
</html>
